<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Archery Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Portrait orientation warning */
        #rotate-msg {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            text-align: center;
            padding-top: 20%;
            font-size: 24px;
            color: #fff;
        }

        @media (orientation: portrait) {
            #rotate-msg { display: block; }
            #game-container { display: none; }
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: linear-gradient(to bottom, #141e30, #243b55);
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="rotate-msg">📱 Please Rotate Your Phone to Landscape Mode to Play!</div>

    <div id="game-container">
        <div class="ui-panel">
            Score: <span id="score-val">0</span> | Arrows: <span id="arrows-val">5</span>
        </div>
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreVal = document.getElementById("score-val");
        const arrowsVal = document.getElementById("arrows-val");

        let score = 0, arrows = 5, gameOver = false;
        const gravity = 0.15;
        const bow = { x: 100, y: 250, radius: 45 };
        
        let arrow = { x: bow.x, y: bow.y, vx: 0, vy: 0, isFlying: false, isDragging: false, pullX: 0, pullY: 0, angle: 0, length: 60 };
        let target = { x: 820, y: 250, radius: 40, speed: 4, direction: 1 };
        let mouse = { x: 0, y: 0 };

        // Touch handling
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let tx = e.touches[0].clientX - rect.left;
            let ty = e.touches[0].clientY - rect.top;
            
            if (Math.hypot(tx - bow.x, ty - bow.y) < 100) arrow.isDragging = true;
        });

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (!arrow.isDragging) return;
            const rect = canvas.getBoundingClientRect();
            let tx = e.touches[0].clientX - rect.left;
            let ty = e.touches[0].clientY - rect.top;
            
            let dx = Math.min(Math.max(tx - bow.x, -120), 0);
            let dy = Math.min(Math.max(ty - bow.y, -120), 120);
            arrow.pullX = dx; arrow.pullY = dy;
            arrow.angle = Math.atan2(-dy, -dx);
        });

        canvas.addEventListener("touchend", (e) => {
            if (!arrow.isDragging) return;
            arrow.isDragging = false;
            arrow.vx = Math.cos(arrow.angle) * Math.abs(arrow.pullX) * 0.15;
            arrow.vy = Math.sin(arrow.angle) * Math.abs(arrow.pullX) * 0.15;
            arrow.isFlying = true;
            arrow.x = bow.x; arrow.y = bow.y;
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Target movement
            if (!gameOver) {
                target.y += target.speed * target.direction;
                if (target.y < 50 || target.y > 450) target.direction *= -1;
            }

            // Arrow Physics
            if (arrow.isFlying) {
                arrow.vy += gravity;
                arrow.x += arrow.vx;
                arrow.y += arrow.vy;
                arrow.angle = Math.atan2(arrow.vy, arrow.vx);
                
                // Collision
                if (arrow.x > target.x - 20 && arrow.x < target.x + 20 && Math.abs(arrow.y - target.y) < target.radius) {
                    score += 10;
                    scoreVal.innerText = score;
                    target.speed += 0.5;
                    resetArrow();
                } else if (arrow.x > canvas.width || arrow.y > canvas.height) resetArrow();
            }

            // Draw
            ctx.beginPath(); ctx.arc(target.x, target.y, target.radius, 0, Math.PI*2);
            ctx.fillStyle = "red"; ctx.fill();

            // Draw Arrow
            ctx.save();
            ctx.translate(arrow.isFlying ? arrow.x : bow.x + arrow.pullX, arrow.isFlying ? arrow.y : bow.y + arrow.pullY);
            ctx.rotate(arrow.angle);
            ctx.fillStyle = "white"; ctx.fillRect(0, -2, 60, 4);
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        function resetArrow() {
            arrow.isFlying = false; arrow.x = bow.x; arrow.y = bow.y;
            arrow.pullX = 0; arrow.pullY = 0;
            arrows--; arrowsVal.innerText = arrows;
            if (arrows <= 0) { alert("Game Over! Score: " + score); location.reload(); }
        }

        gameLoop();
    </script>
</body>
</html>
