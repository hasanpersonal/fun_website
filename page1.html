<style>
    /* Global Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --card-bg: #36454F;
        --card-border: #eeeeee;
        --card-shadow: rgba(0, 0, 0, 0.1);
        --card-radius: 20px;
        --title-bg: #36454F; /* Title box-er pichone color */
    }

    body {
        background-color: #faf0e6; /* Background ektu off-white jate card gulo fute uthe */
    }

    .video-page-container {
        width: 100%;
        max-width: 100%; /* Puru screen nibe */
        margin: 0 auto;
        padding: 0; /* Side padding kete dilam jate container puru width pay */
    }

    .page-main-title {
        text-align: center;
        padding: 30px 10px;
        font-family: 'Segoe UI', sans-serif;
        color: #333;
    }

    .video-card {
        width: 100%;
        background: var(--card-bg);
        margin-bottom: 40px;
        border-top: 1px solid var(--card-border);
        border-bottom: 1px solid var(--card-border);
        box-shadow: 0 4px 15px var(--card-shadow);
        overflow: hidden;
    }

    /* Title Box - Upore thakbe */
    .card-header {
        padding: 15px 20px;
        background: var(--title-bg);
        border-bottom: 1px solid #eee;
    }

    .card-header h2 {
        font-size: 1.2rem;
        font-family: 'Segoe UI', sans-serif;
        color: #faf0e6;
        font-weight: 600;
    }

    /* Video Section - Screen 100% Width */
    .video-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 Ratio */
        height: 0;
        background: #000;
    }

    .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Card Footer - Nich diye container ber hoye thakbe */
    .card-footer {
        padding: 15px 20px;
        background: var(--card-bg);
        min-height: 20px; /* Halka ektu niche container thakbe */
    }
    .card-footer {
        font-color: #faf0e6;
    }

    /* Responsive adjustment for Desktop */
    @media (min-width: 768px) {
        .video-card {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
        }
        .video-page-container {
            padding: 20px;
        }
    }
</style>
