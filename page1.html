<style>
    /* --- EIKHANE EKBAR CHANGE KORLEI SHOB CHANGE HOBE --- */
    :root {
        --card-bg: #ffffff;           /* Card-er background color */
        --card-border: #dddddd;      /* Card-er border color */
        --card-shadow: rgba(0,0,0,0.08); /* Shadow style */
        --card-radius: 15px;         /* Corner koto gulo hobe */
        --title-color: #333333;      /* Title-er font color */
        --video-bg: #000000;         /* Video box-er background */
    }

    .video-page-container {
        width: 100%;
        height: auto;
        margin: 0 auto;
        padding: 20px;
        position: left;
    }

    .video-card {
        margin-bottom: 40px;
        padding: 5px;
        border: 1px solid var(--card-border);
        border-radius: var(--card-radius);
        background: var(--card-bg);
        box-shadow: 0 4px 12px var(--card-shadow);
        transition: transform 0.3s ease;
    }

    .video-card:hover {
        transform: translateY(-5px); /* Mouse nile ektu upore uthbe */
    }

    .video-card h2 {
        font-size: 1.3rem;
        color: var(--title-color);
        font-family: 'Segoe UI', sans-serif;
        margin-bottom: 15px;
    }

    .video-wrapper {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 ratio */
        height: 0;
        overflow: hidden;
        border-radius: calc(var(--card-radius) - 5px);
        background: var(--video-bg);
    }

    .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
