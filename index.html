<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Surprise</title>
    <style>
        /* Main Page Styling */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #4facfe, #00f2fe);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { margin-bottom: 30px; opacity: 0.8; }

        .magic-btn {
            background: #ff4b2b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }

        .magic-btn:hover {
            transform: scale(1.1);
            background: #ff416c;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome</h1>
        <p>This is my first online website</p>
        <button class="magic-btn" onclick="openSurprise()">Click Here</button>
    </div>

    <script>
    function openSurprise() {
        let myWindow = window.open("", "LinkWindow", "width=450,height=450,top=150,left=200");

        myWindow.document.write(`
            <html>
                <head>
                    <title>What's Next?</title>
                    <style>
                        body { 
                            background: linear-gradient(to bottom, #1e3c72, #2a5298); 
                            color: white; 
                            font-family: sans-serif; 
                            display: flex; 
                            flex-direction: column; 
                            align-items: center; 
                            justify-content: center; 
                            height: 100vh; 
                            margin: 0; 
                        }
                        .btn { 
                            width: 80%; 
                            padding: 15px; 
                            margin: 8px 0; 
                            text-align: center; 
                            text-decoration: none; 
                            border-radius: 12px; 
                            font-weight: bold; 
                            font-size: 1rem; 
                            transition: 0.3s; 
                            display: block; 
                            color: white;
                        }
                        .home-btn { background: #ff4b2b; }
                        .wa-btn { background: #25D366; }
                        .college-btn { background: #6a11cb; }
                        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
                    </style>
                </head>
                <body>
                    <h2 style="margin-bottom: 20px;">Options for You</h2>
                    
                    <a href="index.html" class="btn home-btn" onclick="window.opener.location.href='index.html'; window.close();">🏠 Back to Home</a>
                    
                    <a href="https://wa.me/8801799344393" target="_blank" class="btn wa-btn">💬 WhatsApp Me</a>
                    
                    <a href="http://cascedu.bd" target="_blank" class="btn college-btn">🏫 College</a>

                </body>
            </html>
        `);
    }
    </script>

</body>
</html>
