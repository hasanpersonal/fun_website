<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Halka kalo ba dark gray background */
            background-color: #979fd1; 
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        .home-link {
    display: block;
    text-align: center;
    text-decoration: none;
    color: #333; /* Apnar pochondo moto color dite paren */
    font-size: 2.0rem;
    font-weight: bold;
    margin-bottom: 10px;
}
.home-link:hover {
    color: #007bff; /* Hover korle color change hobe */
}

        .container {
            background-color: #28afe0;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">Hasan's WEB</a>
    

    <div class="container">
        <h1>Welcome</h1>
        <p>This is my first online website</p>

         <a href="page2.html" class="btn" style="text-decoration: none; display: inline-block;">Page 2</a>
        <a href="page3.html" class="btn" style="text-decoration: none; display: inline-block;">Page 3</a>
    </div>

 <footer style="text-align: center; font-size: 1.2rem; color: #ffffff; margin-top: 40px; padding: 20px; font-weight: bold; letter-spacing: 1px;">

 </footer>
