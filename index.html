<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Halka kalo ba dark gray background */
            background-color: #979fd1; 
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        .top-header {
    text-align: center;
    padding-top: 30px; /* Upore space baranor jonno */
    margin-bottom: 20px;
}

.brand-container {
    display: inline-block;
    padding: 10px 25px;
    border: 2px solid #333;
    border-radius: 5px;
    background-color: #fff;
    text-decoration: none;
    transition: all 0.3s ease;
}

.brand-container:hover {
    background-color: #333;
}

.brand-text {
    font-size: 2.0rem;
    font-weight: bold;
    color: #333;
    margin: 0;
}

.brand-container:hover .brand-text {
    color: #fff; /* Hover korle lekhar color change hobe */
}
        
        .container {
            background-color: #28afe0;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 30px;
        }

        /* Button er main style */

        .btn {
    background-color: #ff4757;
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block; /* Margin ar width kaj korar jonno eta dorkar */
    min-width: 160px;      /* Button-er width boro korbe */
    margin: 15px 10px;    /* 15px upor-nich, 10px pashapashi faka korbe */
    text-align: center;
    transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
}

/* Button-e mouse nile ba touch korle ja hobe */

        .btn:hover {
    background-color: #ff6b81; /* Halka color hobe */
    transform: scale(1.05);    /* 5% boro hobe */
    box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); /* Niche shadow porbe */
}

    </style>
</head>
<body>
   
    <div class="top-header">
    <a href="index.html" class="brand-container">
        <span class="brand-text">Hasan's WEB</span>
    </a>
    </div>
    
    

    <div class="container">
        <h1>Welcome</h1>
        <p>This is my first online website</p>

         <a href="page2.html" class="btn" style="text-decoration: none; display: inline-block;">Page 2</a>
     
        <a href="page3.html" class="btn" style="text-decoration: none; display: inline-block;">Page 3</a>
    </div>

 <footer style="text-align: center; font-size: 1.2rem; color: #ffffff; margin-top: 40px; padding: 20px; font-weight: bold; letter-spacing: 1px;">
    This website is coded by Imrul Hasan😇
     using html and css (host:github)😌
 </footer>
    
</body>
    </html>
