<!-- Google Fonts (Inter) এবং FontAwesome (Icons) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* মডার্ন মিনিমালিস্ট সেটআপ */
    :root {
        --bg-color: #f8fafc; /* হালকা সুন্দর ব্যাকগ্রাউন্ড */
        --card-bg: #ffffff;
        --text-main: #0f172a; /* গাঢ় কালচে-নীল টেক্সট */
        --text-muted: #64748b;
        --primary-color: #0ea5e9; /* সুন্দর একটি নীল রঙ */
        --primary-hover: #0284c7;
    }

    /* হিরো সেকশন - ডট প্যাটার্ন ব্যাকগ্রাউন্ড সহ */
    .minimal-hero {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
        background-color: var(--bg-color);
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px; /* প্রিমিয়াম ডট প্যাটার্ন */
        color: var(--text-main);
    }

    /* মেইন কার্ড ডিজাইন */
    .clean-container {
        background: var(--card-bg);
        padding: 50px 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08), 0 0 10px rgba(0,0,0,0.02);
        width: 100%;
        max-width: 480px;
        border: 1px solid #f1f5f9;
        transition: transform 0.3s ease;
    }

    .clean-container:hover {
        transform: translateY(-5px);
    }

    .clean-container h1 {
        font-size: 3.5rem;
        font-weight: 800;
        margin: 0 0 8px 0;
        color: var(--text-main);
        letter-spacing: -1.5px;
    }

    .clean-container p {
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-bottom: 35px;
        font-weight: 400;
    }

    /* বাটনগুলো সুন্দরভাবে সাজানোর জন্য স্ট্যাক লেআউট */
    .button-stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* সাধারণ বাটন ডিজাইন */
    .clean-btn {
        background-color: #ffffff;
        color: #334155;
        border: 2px solid #e2e8f0;
        padding: 16px 20px;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 16px;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.3s ease;
    }

    .clean-btn:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
        background-color: #f0f9ff;
        box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.1);
    }
    
    /* স্পেশাল/মেইন বাটন ডিজাইন (প্রথমটির জন্য) */
    .clean-btn.highlight {
        background-color: var(--primary-color);
        color: #ffffff;
        border: none;
        box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25);
    }

    .clean-btn.highlight:hover {
        background-color: var(--primary-hover);
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(14, 165, 233, 0.4);
    }

    .clean-btn i {
        font-size: 1.2rem;
    }

    /* ফুটার ডিজাইন */
    .minimal-footer {
        margin-top: 50px;
        text-align: center;
    }

    .footer-highlight {
        font-size: 1.1rem;
        font-weight: 700;
        color: #334155;
        display: block;
        margin-bottom: 5px;
    }

    .footer-text {
        font-size: 0.9rem;
        color: #64748b;
        display: block;
        margin-bottom: 15px;
    }

    .footer-badge {
        display: inline-block;
        background: #e2e8f0;
        color: #475569;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1px;
    }
</style>

<div class="minimal-hero">
    <div class="clean-container">
        <h1>Welcome</h1>
        <p>This is my first online website</p>
    
        <div class="button-stack">
            <!-- প্রথম বাটনটিকে একটু বেশি ফোকাস করা হয়েছে -->
            <a href="page1.html" class="clean-btn highlight">
                <i class="fa-solid fa-rocket"></i> Go to Page 1
            </a>
            <a href="page2.html" class="clean-btn">
                <i class="fa-regular fa-file-lines"></i> Explore Page 2
            </a>
            <a href="games/game.html" class="clean-btn">
                <i class="fa-solid fa-gamepad"></i> Games by me
            </a>
            <a href="pagecontact.html" class="clean-btn">
                <i class="fa-solid fa-headset"></i> Contact & Support
            </a>
        </div>
    </div>

    <div class="minimal-footer">
        <span class="footer-highlight">Coded by Imrul Hasan 😇</span>
        <span class="footer-text">Using HTML & CSS (Hosted on GitHub) 😌</span>
        <span class="footer-badge">WEB PROJECT 2026 ✓✓</span>
    </div>
</div>
