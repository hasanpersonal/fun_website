<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Page</title>
    <style>
        /* Main Page Styling */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 20px;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #00d4ff;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
        }

        .magic-button {
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .magic-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Surprise! 🎁</h1>
        <p>You've found the secret navigation panel.</p>
        <button class="magic-button" onclick="openSurprise()">Open Options</button>
    </div>

    <script>
        function openSurprise() {
            // Choto window open kora
            const width = 400;
            const height = 350;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            
            let myWindow = window.open("", "LinkWindow", `width=${width},height=${height},top=${top},left=${left}`);

            // Window-r bhetorer content
            myWindow.document.write(`
                <html>
                    <head>
                        <title>Quick Links</title>
                        <style>
                            body { 
                                background-color: #121212; 
                                color: white; 
                                font-family: sans-serif; 
                                display: flex; 
                                flex-direction: column; 
                                align-items: center; 
                                justify-content: center; 
                                height: 100vh; 
                                margin: 0; 
                            }
                            h3 { color: #00d4ff; margin-bottom: 20px; }
                            .btn {
                                width: 85%;
                                padding: 14px;
                                margin: 8px 0;
                                text-align: center;
                                text-decoration: none;
                                border-radius: 10px;
                                font-weight: bold;
                                font-size: 1rem;
                                display: block;
                                cursor: pointer;
                                transition: 0.2s;
                                border: none;
                                outline: none;
                            }
                            .home-btn { background-color: #00d4ff; color: #000; }
                            .wa-btn { background-color: #25D366; color: #fff; }
                            .btn:hover { opacity: 0.9; transform: scale(1.02); }
                            .footer-text { font-size: 0.7rem; color: #555; margin-top: 15px; }
                        </style>
                    </head>
                    <body>
                        <h3>Menu</h3>

                        <button class="btn home-btn" onclick="window.opener.location.href='index.html'; window.close();">
                            🏠 Back to Home
                        </button>

                        <a href="https://wa.me/8801799344393" target="_blank" class="btn wa-btn">
                            💬 Message on WhatsApp
                        </a>
                        
                        <p class="footer-text">Select an option to continue</p>
                    </body>
                </html>
            `);
        }
    </script>

</body>
</html>
