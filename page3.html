<style>
    .video-card {
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-bottom: 20px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        overflow: hidden;

    .card-image-area {

        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .card-text-area {
        flex: 2;
        padding: 10px 20px; /* Padding komiye space bachalam */

    .card-title {

        color: #2c3e50;
        margin: 0 0 5px 0;
        font-family: sans-serif;
    }

    .btn-view {
        display: inline-block;

        background: #28a745;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        font-size: 0.8rem;
    }
</style>
