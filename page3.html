<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .top-header {
    text-align: center;
    padding-top: 30px; /* Upore space baranor jonno */
    margin-bottom: 20px;
            }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Video Card Design */
        .video-card {
            display: flex;
            align-items: center;
            background: #fff;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-decoration: none; /* Link er underline remove korar jonno */
        }
        .video-card:hover {
            transform: scale(1.02);
            background-color: #f0f7ff;
        }
        .video-thumb {
            width: 150px;
            height: 90px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 20px;
        }
        .video-title {
            font-size: 1.2rem;
            color: #007bff;
            font-weight: bold;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        footer {
            text-align: center;
            margin-top: 50px;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Gallery</h1>

        <a href="APNAR_DRIVE_LINK_1" target="_blank" class="video-card">
            <img src="Screenshot_2026_0424_150716.png" alt="Video Thumbnail" class="video-thumb">
            <div class="video-title">test video 1</div>
        </a>

        <a href="APNAR_DRIVE_LINK_2" target="_blank" class="video-card">
            <img src="Screenshot_2026_0424_150716.png" alt="Video Thumbnail" class="video-thumb">
            <div class="video-title">video 2</div>
        </a>

        <a href="APNAR_DRIVE_LINK_3" target="_blank" class="video-card">
            <img src="Screenshot_2026_0424_150716.png" alt="Video Thumbnail" class="video-thumb">
            <div class="video-title">Third Video</div>
        </a>
        
        <a href="index.html" class="back-btn">Back to Main Page</a>

    </div>

    <footer>
        &copy; 2026 Video Gallery Project
    </footer>

</body>
</html>
