<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <title>Neon Drive 3D</title>
    <style>
        /* CSS Reset & Basic Setup */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; overflow: hidden;
            touch-action: none; /* Prevent scroll on touch */
            font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-user-select: none;
        }

        /* Canvas */
        #gameCanvas {
            display: block;
            width: 100%; height: 100%;
        }

        /* UI Layer */
        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let touches pass through to document */
        }

        /* HUD - Heads Up Display */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            color: #fff; font-size: 14px; font-weight: bold;
            text-shadow: 0 0 5px #0ff;
            display: flex; flex-wrap: wrap; justify-content: space-between;
        }
        .hud-item { margin-bottom: 5px; }
        .neon-text-green { color: #0f0; text-shadow: 0 0 5px #0f0; }
        .neon-text-yellow { color: #ff0; text-shadow: 0 0 5px #ff0; }
        .neon-text-cyan { color: #0ff; text-shadow: 0 0 5px #0ff; }
        .neon-text-magenta { color: #f0f; text-shadow: 0 0 5px #f0f; }

        /* Buttons */
        .action-btn {
            position: absolute; bottom: 30px;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
            pointer-events: auto; /* Buttons must be clickable */
            z-index: 10;
        }
        #btnShootL { 
            left: 20px; border: 2px solid #0ff; color: #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
        }
        #btnShootR { 
            right: 20px; border: 2px solid #0ff; color: #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
        }
        #btnBomb { 
            left: 50%; transform: translateX(-50%); bottom: 20px;
            width: 65px; height: 65px;
            border: 2px solid #f0f; color: #f0f;
            box-shadow: 0 0 15px #f0f, inset 0 0 15px #f0f;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.2); }

        /* Dynamic Joystick */
        #joystickBase {
            position: absolute; width: 100px; height: 100px;
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 50%;
            transform: translate(-50%, -50%); display: none; pointer-events: none;
            z-index: 5;
        }
        #joystickKnob {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.6); box-shadow: 0 0 10px #0ff;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        /* Game Over Screen */
        #gameOver {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto;
        }
        #gameOver h1 { color: #f00; text-shadow: 0 0 20px #f00; font-size: 30px; }
        #restartBtn {
            padding: 10px 20px; font-size: 18px; color: #0ff; background: transparent;
            border: 2px solid #0ff; box-shadow: 0 0 10px #0ff; border-radius: 5px;
            margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <div id="hud">
            <div class="hud-item neon-text-green">FUEL: <span id="valFuel">100</span>%</div>
            <div class="hud-item neon-text-yellow">NITRO: <span id="valNitro">100</span>%</div>
            <div class="hud-item neon-text-cyan">BULLETS: <span id="valBullets">0</span></div>
            <div class="hud-item neon-text-magenta">BOMBS: <span id="valBombs">0</span></div>
            <div class="hud-item">STARS: <span id="valStars">0</span></div>
            <div class="hud-item" style="width:100%; text-align:center; margin-top:5px;">SCORE: <span id="valScore">0</span></div>
        </div>

        <div id="btnShootL" class="action-btn">Shoot</div>
        <div id="btnBomb" class="action-btn">Bomb</div>
        <div id="btnShootR" class="action-btn">Shoot</div>

        <div id="joystickBase">
            <div id="joystickKnob"></div>
        </div>
    </div>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p style="color:white;">Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State Variables
        let isGameOver = false;
        let lastTime = 0;
        let score = 0;
        let cameraY = 0;
        let distanceTravelled = 0;

        // Player Stats
        let player = { worldX: 0, speed: 0 };
        let fuel = 100;
        let nitro = 100;
        let bullets = 0;
        let bombs = 0;
        let stars = 0;

        // Entities arrays
        let objects = []; 
        let projectiles = [];
        let particles = [];

        // Constants
        const SPEED_NORMAL = 140;
        const SPEED_NITRO = 300;
        const SPEED_BRAKE = 60;
        const VIEW_DISTANCE = 2000;
        const ROAD_TOP_WIDTH_RATIO = 0.05;
        const ROAD_BOTTOM_WIDTH_RATIO = 1.2;

        // Joystick Data
        let joyActive = false;
        let joyTouchId = null;
        let joyBase = { x: 0, y: 0 };
        let joyDir = { x: 0, y: 0 }; // Normalized -1 to 1
        const joyMaxRadius = 40;

        const joystickBaseEl = document.getElementById('joystickBase');
        const joystickKnobEl = document.getElementById('joystickKnob');

        // -------------------------
        // Input Handling (Touch)
        // -------------------------
        document.addEventListener('touchstart', handleTouchStart, {passive: false});
        document.addEventListener('touchmove', handleTouchMove, {passive: false});
        document.addEventListener('touchend', handleTouchEnd, {passive: false});
        document.addEventListener('touchcancel', handleTouchEnd, {passive: false});

        function handleTouchStart(e) {
            if(isGameOver) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                let target = document.elementFromPoint(touch.clientX, touch.clientY);
                
                // Check if pressed a button
                if (target && target.classList.contains('action-btn')) {
                    if (target.id === 'btnShootL' || target.id === 'btnShootR') fireBullet();
                    if (target.id === 'btnBomb') fireBomb();
                    continue; // Skip joystick logic for this touch
                }

                // Otherwise, activate joystick
                if (!joyActive) {
                    joyActive = true;
                    joyTouchId = touch.identifier;
                    joyBase.x = touch.clientX;
                    joyBase.y = touch.clientY;
                    joystickBaseEl.style.display = 'block';
                    joystickBaseEl.style.left = joyBase.x + 'px';
                    joystickBaseEl.style.top = joyBase.y + 'px';
                    joystickKnobEl.style.transform = `translate(-50%, -50%)`;
                    joyDir = {x: 0, y: 0};
                }
            }
        }

        function handleTouchMove(e) {
            if (!joyActive) return;
            e.preventDefault(); // Prevent scrolling
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.identifier === joyTouchId) {
                    let dx = touch.clientX - joyBase.x;
                    let dy = touch.clientY - joyBase.y;
                    let dist = Math.hypot(dx, dy);
                    
                    if (dist > joyMaxRadius) {
                        dx = (dx / dist) * joyMaxRadius;
                        dy = (dy / dist) * joyMaxRadius;
                    }
                    
                    joystickKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    
                    joyDir.x = dx / joyMaxRadius;
                    joyDir.y = dy / joyMaxRadius;
                }
            }
        }

        function handleTouchEnd(e) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joyTouchId) {
                    joyActive = false;
                    joyTouchId = null;
                    joystickBaseEl.style.display = 'none';
                    joyDir = {x: 0, y: 0};
                }
            }
        }

        // -------------------------
        // Actions
        // -------------------------
        function fireBullet() {
            if (bullets > 0) {
                bullets--;
                projectiles.push({
                    worldX: player.worldX,
                    worldY: cameraY + 200, // Spawn just ahead of player
                    speed: player.speed + 600,
                    active: true
                });
            }
        }

        function fireBomb() {
            if (bombs > 0) {
                bombs--;
                createExplosion(0, cameraY + 500, 100, '#f0f'); // Big screen flash effect
                
                // Destroy all visible enemies
                objects.forEach(obj => {
                    if (obj.type === 'enemy' && obj.worldY > cameraY && obj.worldY < cameraY + VIEW_DISTANCE) {
                        obj.active = false;
                        createExplosion(obj.worldX, obj.worldY, 20, '#f00');
                        score += 50;
                    }
                });
            }
        }

        // -------------------------
        // Core Logic
        // -------------------------
        function initGame() {
            isGameOver = false;
            score = 0; cameraY = 0; distanceTravelled = 0;
            player = { worldX: 0, speed: SPEED_NORMAL };
            fuel = 100; nitro = 100; bullets = 0; bombs = 0; stars = 0;
            objects = []; projectiles = []; particles = [];
            document.getElementById('gameOver').style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('restartBtn').addEventListener('click', initGame);

        function spawnObjects() {
            // Randomly spawn objects ahead
            if (Math.random() < 0.08) { // Spawn rate
                let r = Math.random();
                let type = 'enemy';
                if (r < 0.1) type = 'fuel';
                else if (r < 0.25) type = 'energy';
                else if (r < 0.4) type = 'star';

                objects.push({
                    type: type,
                    worldX: (Math.random() * 2 - 1) * 0.8, // -0.8 to 0.8 width
                    worldY: cameraY + VIEW_DISTANCE,
                    speed: type === 'enemy' ? (SPEED_NORMAL - 40 + Math.random()*50) : 0,
                    active: true
                });
            }
        }

        function createExplosion(worldX, worldY, count, color) {
            for(let i=0; i<count; i++) {
                particles.push({
                    worldX: worldX,
                    worldY: worldY,
                    vx: (Math.random() - 0.5) * 0.1,
                    vy: (Math.random() - 0.5) * 100,
                    life: 1.0,
                    color: color
                });
            }
        }

        function update(dt) {
            let dtSec = dt / 1000;

            // 1. Handle Speed based on Joystick (Y axis)
            let targetSpeed = SPEED_NORMAL;
            if (joyDir.y < -0.3) {
                if (nitro > 0) {
                    targetSpeed = SPEED_NITRO;
                    nitro -= 15 * dtSec; // Drains nitro when used
                } else { targetSpeed = SPEED_NORMAL; }
            } else if (joyDir.y > 0.3) {
                targetSpeed = SPEED_BRAKE;
            }
            if (nitro < 0) nitro = 0;
            
            // Smooth speed transition (aste aste)
            player.speed += (targetSpeed - player.speed) * 0.05;

            // 2. Handle Steering (X axis)
            player.worldX += joyDir.x * dtSec * 1.5;
            if (player.worldX < -1) player.worldX = -1;
            if (player.worldX > 1) player.worldX = 1;

            // 3. Update Camera and distance
            let moveDist = player.speed * dtSec;
            cameraY += moveDist;
            distanceTravelled += moveDist;
            score += Math.floor(moveDist / 10);

            // 4. Fuel Consumption (100% = 20s -> 5% per second)
            fuel -= 5 * dtSec;
            if (fuel <= 0) { fuel = 0; die(); }

            // 5. Spawn new objects
            spawnObjects();

            // 6. Update Objects & Collisions
            for (let i = 0; i < objects.length; i++) {
                let obj = objects[i];
                if (!obj.active) continue;

                if (obj.type === 'enemy') {
                    obj.worldY += obj.speed * dtSec;
                }

                // Check collision with player
                let dx = Math.abs(obj.worldX - player.worldX);
                let dy = Math.abs(obj.worldY - (cameraY + 150)); // Player visually at offset 150

                if (dy < 60 && dx < 0.2) { // Collision hit box
                    obj.active = false;
                    if (obj.type === 'fuel') {
                        fuel = Math.min(100, fuel + 50);
                    } else if (obj.type === 'energy') {
                        nitro = Math.min(100, nitro + 20);
                        bullets++;
                    } else if (obj.type === 'star') {
                        stars++;
                        if (stars >= 10) { stars = 0; bombs++; }
                    } else if (obj.type === 'enemy') {
                        // Crash! Penalty
                        fuel -= 10;
                        player.speed = 0;
                        createExplosion(player.worldX, cameraY + 150, 15, '#f00');
                    }
                }
            }

            // 7. Update Projectiles (Bullets)
            for (let i = 0; i < projectiles.length; i++) {
                let proj = projectiles[i];
                if (!proj.active) continue;
                proj.worldY += proj.speed * dtSec;

                // Collision with enemies
                objects.forEach(obj => {
                    if (obj.active && obj.type === 'enemy') {
                        let pdx = Math.abs(obj.worldX - proj.worldX);
                        let pdy = Math.abs(obj.worldY - proj.worldY);
                        if (pdy < 80 && pdx < 0.25) {
                            obj.active = false;
                            proj.active = false;
                            createExplosion(obj.worldX, obj.worldY, 20, '#f90');
                            score += 20;
                        }
                    }
                });
            }

            // 8. Update Particles
            particles.forEach(p => {
                p.worldX += p.vx;
                p.worldY += p.vy * dtSec;
                p.life -= dtSec * 2;
            });

            // Cleanup inactive or out-of-bounds objects
            objects = objects.filter(o => o.active && o.worldY > cameraY - 200);
            projectiles = projectiles.filter(p => p.active && p.worldY < cameraY + VIEW_DISTANCE);
            particles = particles.filter(p => p.life > 0);

            updateHUD();
        }

        function die() {
            isGameOver = true;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function updateHUD() {
            document.getElementById('valFuel').innerText = Math.floor(fuel);
            document.getElementById('valNitro').innerText = Math.floor(nitro);
            document.getElementById('valBullets').innerText = bullets;
            document.getElementById('valBombs').innerText = bombs;
            document.getElementById('valStars').innerText = stars;
            document.getElementById('valScore').innerText = score;
        }

        // -------------------------
        // Rendering (Pseudo-3D)
        // -------------------------
        // Helper: Convert World (X, Y) to Screen (X, Y, Scale)
        function project(worldX, worldY) {
            let dz = worldY - cameraY;
            if (dz < -100 || dz > VIEW_DISTANCE) return null; // Outside view

            // Perspective factor (0 at horizon, 1 at camera)
            let pz = 1 - (dz / VIEW_DISTANCE);
            if (pz < 0) pz = 0;
            
            // Curve the perspective to make road feel natural
            let pzSq = pz * pz; 

            let horizonY = canvas.height * 0.35;
            let screenY = horizonY + (canvas.height - horizonY) * pzSq;

            let topW = canvas.width * ROAD_TOP_WIDTH_RATIO;
            let botW = canvas.width * ROAD_BOTTOM_WIDTH_RATIO;
            let currentRoadW = topW + (botW - topW) * pzSq;

            let screenX = canvas.width/2 + (worldX * (currentRoadW / 2));
            
            return { x: screenX, y: screenY, scale: pzSq, pz: pz };
        }

        function render() {
            // Clear & Setup Neon Effect
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            // 1. Draw Road (Trapezoid Perspective)
            let horizonY = canvas.height * 0.35;
            let topW = canvas.width * ROAD_TOP_WIDTH_RATIO;
            let botW = canvas.width * ROAD_BOTTOM_WIDTH_RATIO;

            // Road borders (Neon Pink/Cyan)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.moveTo(canvas.width/2 - topW/2, horizonY);
            ctx.lineTo(canvas.width/2 - botW/2, canvas.height);
            ctx.stroke();

            ctx.shadowColor = '#f0f';
            ctx.strokeStyle = '#f0f';
            ctx.beginPath();
            ctx.moveTo(canvas.width/2 + topW/2, horizonY);
            ctx.lineTo(canvas.width/2 + botW/2, canvas.height);
            ctx.stroke();

            // Moving Grid/Lane lines
            ctx.shadowBlur = 5;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1;
            let lineSpacing = 200;
            let offset = cameraY % lineSpacing;
            for (let y = VIEW_DISTANCE; y > 0; y -= lineSpacing) {
                let p = project(0, cameraY + y - offset);
                if (p) {
                    ctx.beginPath();
                    // Draw horizontal marker
                    let w = (topW + (botW - topW) * p.scale) / 2;
                    ctx.moveTo(canvas.width/2 - w, p.y);
                    ctx.lineTo(canvas.width/2 + w, p.y);
                    ctx.stroke();
                }
            }

            // 2. Draw Objects
            // Sort by Y descending (draw furthest first)
            let renderList = [];
            
            objects.forEach(obj => {
                let p = project(obj.worldX, obj.worldY);
                if (p) renderList.push({ ...p, obj: obj });
            });
            
            projectiles.forEach(proj => {
                let p = project(proj.worldX, proj.worldY);
                if (p) renderList.push({ ...p, obj: {type: 'bullet'} });
            });

            // Add Player to render list
            let playerP = project(player.worldX, cameraY + 150); // fixed offset from camera
            if(playerP) renderList.push({ ...playerP, obj: {type: 'player'} });

            renderList.sort((a, b) => a.y - b.y);

            // Draw Entities
            renderList.forEach(item => {
                let s = Math.max(0.1, item.scale);
                let w = 60 * s; 
                let h = 30 * s;

                ctx.shadowBlur = 10;
                
                if (item.obj.type === 'player') {
                    // Player Car
                    ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff';
                    ctx.fillRect(item.x - w, item.y - h, w*2, h*2);
                    // Nitro tail
                    if(player.speed > SPEED_NORMAL) {
                        ctx.fillStyle = '#f90'; ctx.shadowColor = '#f00';
                        ctx.fillRect(item.x - w + 5*s, item.y + h, w*2 - 10*s, h*1.5);
                    }
                } else if (item.obj.type === 'enemy') {
                    // Enemy Car
                    ctx.fillStyle = '#f00'; ctx.shadowColor = '#f00';
                    ctx.fillRect(item.x - w, item.y - h, w*2, h*2);
                } else if (item.obj.type === 'fuel') {
                    ctx.fillStyle = '#0f0'; ctx.shadowColor = '#0f0';
                    ctx.beginPath(); ctx.arc(item.x, item.y, w, 0, Math.PI*2); ctx.fill();
                } else if (item.obj.type === 'energy') {
                    ctx.fillStyle = '#ff0'; ctx.shadowColor = '#ff0';
                    ctx.fillRect(item.x - w/2, item.y - w/2, w, w);
                } else if (item.obj.type === 'star') {
                    ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff';
                    ctx.beginPath();
                    for(let i=0; i<5; i++) {
                        ctx.lineTo(item.x + Math.cos((18+i*72)*Math.PI/180)*w, item.y - Math.sin((18+i*72)*Math.PI/180)*w);
                        ctx.lineTo(item.x + Math.cos((54+i*72)*Math.PI/180)*w/2, item.y - Math.sin((54+i*72)*Math.PI/180)*w/2);
                    }
                    ctx.closePath(); ctx.fill();
                } else if (item.obj.type === 'bullet') {
                    ctx.fillStyle = '#0ff'; ctx.shadowColor = '#fff';
                    ctx.fillRect(item.x - 2, item.y - 10*s, 4, 20*s);
                }
            });

            // 3. Draw Particles (Explosions)
            particles.forEach(p => {
                let pp = project(p.worldX, p.worldY);
                if (pp) {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fillRect(pp.x, pp.y, 10 * pp.scale, 10 * pp.scale);
                    ctx.globalAlpha = 1.0;
                }
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        // -------------------------
        // Game Loop
        // -------------------------
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            // Limit max dt to prevent huge jumps if tab is inactive
            if (dt > 100) dt = 100;

            if (!isGameOver) {
                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }
        }

        // Start 
        initGame();

    </script>
</body>
</html>
