<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DRIVE PRO - Premium Mobile Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            background: #020208;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px; 
            max-height: 920px;
            background: #060612;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Glassmorphism Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.4s ease;
            padding: 30px;
            text-align: center;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff0055, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 15px rgba(0,240,255,0.4));
        }

        .subtitle {
            color: #697cb6;
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Buttons Style */
        .btn-main {
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: linear-gradient(45deg, #ff0055, #7a00ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
            transition: transform 0.2s;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        /* Micro UI Buttons for Game Over */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-small {
            padding: 10px 22px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #ff0055;
            background: rgba(255, 0, 85, 0.1);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-home {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
        }

        .btn-small:active {
            transform: scale(0.92);
        }

        /* Premium HUD */
        #hud {
            position: absolute;
            top: 25px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-item {
            background: rgba(10, 10, 25, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .hud-label { font-size: 0.7rem; color: #697cb6; letter-spacing: 1px; }
        .hud-val { font-size: 1.3rem; font-weight: bold; color: #00f0ff; font-family: monospace; }

        /* Mobile Controller Layout */
        #mobile-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .touch-zone {
            position: absolute;
            bottom: 120px;
            width: 45%;
            height: 60%;
            pointer-events: auto;
        }
        #touch-left { left: 0; }
        #touch-right { right: 0; }

        #nitro-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255,0,85,0.8) 0%, rgba(122,0,255,0.4) 100%);
            border: 2px solid #ff0055;
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            text-shadow: 0 0 5px #fff;
        }
        #nitro-btn:active {
            background: #ff0055;
            box-shadow: 0 0 35px #00f0ff;
        }

        /* Dynamic Orientation Lock Screen */
        #rotate-overlay {
            position: fixed;
            top:0; left:0; width:100vw; height:100vh;
            background: #04040c;
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .phone-icon {
            width: 50px;
            height: 90px;
            border: 3px solid #00f0ff;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: rotateDevice 2s infinite ease-in-out;
            position: relative;
        }
        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 8px; background: #00f0ff; border-radius: 50%;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(90deg); }
            50% { transform: rotate(0deg); }
            100% { transform: rotate(90deg); }
        }

        @media (orientation: landscape) and (max-device-width: 950px), (orientation: landscape) and (max-height: 550px) {
            #rotate-overlay { display: flex; }
        }
    </style>
</head>
<body>

    <!-- Orientation Check Overlay -->
    <div id="rotate-overlay">
        <div class="phone-icon"></div>
        <h2 style="color: #00f0ff; letter-spacing: 1px;">PORTRAIT MODE REQUIRED</h2>
        <p style="color: #697cb6; margin-top: 10px; font-size: 0.9rem;">Please rotate your device upright to drive.</p>
    </div>

    <div id="game-container">
        <!-- HUD Overlay -->
        <div id="hud">
            <div class="hud-item">
                <div class="hud-label">SCORE</div>
                <div id="score-txt" class="hud-val">00000</div>
            </div>
            <div class="hud-item" style="text-align: right;">
                <div class="hud-label">SPEED</div>
                <div id="speed-txt" class="hud-val">0 KMH</div>
            </div>
        </div>

        <!-- Touch Controls Layout -->
        <div id="mobile-ui">
            <div id="touch-left" class="touch-zone"></div>
            <div id="touch-right" class="touch-zone"></div>
            <div id="nitro-btn">NITRO</div>
        </div>

        <!-- Start Game Screen -->
        <div id="start-screen" class="overlay">
            <h1>NEON DRIVE</h1>
            <div class="subtitle">PREMIUM CYBERPUNK RACER</div>
            <button class="btn-main" onclick="initGameAndFullscreen()">DRIVE NOW</button>
            <p style="margin-top: 40px; font-size: 0.8rem; color: #4e5d8c; line-height: 1.5;">
                MOBILE: Tap Left/Right sides to steer. Hold NITRO.<br>
                DESKTOP: Use A/D or Arrows. Spacebar for Nitro.
            </p>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="overlay hidden">
            <h1 style="background: linear-gradient(45deg, #ff0055, #ffcc00);">SYSTEM CRASH</h1>
            <div class="subtitle" id="final-score-lbl">FINAL SCORE: 0</div>
            
            <div class="button-group">
                <button class="btn-small" onclick="restartGame()">Restart</button>
                <button class="btn-small btn-home" onclick="location.href='game.html'">Home</button>
            </div>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const gameWidth = 480;
        const gameHeight = 850;
        canvas.width = gameWidth;
        canvas.height = gameHeight;

        let gameActive = false;
        let score = 0, speed = 0, targetSpeed = 0;
        let nitro = 100, isNitro = false;
        let screenShake = 0, roadOffset = 0;

        let player;
        let enemies = [];
        let particles = [];
        let buildings = [];

        const controls = { left: false, right: false, nitro: false };

        // Desktop Controls
        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') controls.left = true;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') controls.right = true;
            if(e.code === 'Space') { controls.nitro = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') controls.left = false;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') controls.right = false;
            if(e.code === 'Space') controls.nitro = false;
        });

        // Mobile Controls
        document.getElementById('touch-left').addEventListener('touchstart', (e) => { controls.left = true; e.preventDefault(); });
        document.getElementById('touch-left').addEventListener('touchend', (e) => { controls.left = false; e.preventDefault(); });
        document.getElementById('touch-right').addEventListener('touchstart', (e) => { controls.right = true; e.preventDefault(); });
        document.getElementById('touch-right').addEventListener('touchend', (e) => { controls.right = false; e.preventDefault(); });
        
        const nitroBtn = document.getElementById('nitro-btn');
        nitroBtn.addEventListener('touchstart', (e) => { controls.nitro = true; e.preventDefault(); });
        nitroBtn.addEventListener('touchend', (e) => { controls.nitro = false; e.preventDefault(); });

        let audioCtx, engineOsc, engineGain;
        function setupAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(40, audioCtx.currentTime);
            
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(180, audioCtx.currentTime);

            engineOsc.connect(filter);
            filter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            engineOsc.start(0);
        }

        function initGameAndFullscreen() {
            let container = document.getElementById('game-container');
            if (container.requestFullscreen) container.requestFullscreen().catch(()=>{});
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();

            setupAudio();
            restartGame();
            document.getElementById('start-screen').classList.add('hidden');
        }

        class Player {
            constructor() {
                this.w = 42; this.h = 82;
                this.x = gameWidth / 2 - this.w / 2;
                this.y = gameHeight - 160;
                this.vx = 0;
                this.angle = 0;
            }
            update() {
                let dir = 0;
                if (controls.left) dir = -1;
                if (controls.right) dir = 1;

                this.vx += dir * 0.9;
                this.vx *= 0.82;
                this.x += this.vx;

                this.angle += (dir * 0.08 - this.angle) * 0.15;

                if(this.x < 60) { this.x = 60; this.vx = 0; }
                if(this.x > gameWidth - 60 - this.w) { this.x = gameWidth - 60 - this.w; this.vx = 0; }

                if(speed > 20 && Math.random() < 0.5) {
                    let col = isNitro ? '#00f0ff' : '#ff0055';
                    particles.push(new Particle(this.x + this.w/2 + (Math.random()*6-3), this.y + this.h, col, -speed*0.04, Math.random()*4+1));
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.angle);

                ctx.shadowBlur = 15;
                ctx.shadowColor = isNitro ? '#00f0ff' : '#ff0055';
                
                ctx.fillStyle = '#0a0a18';
                ctx.strokeStyle = isNitro ? '#00f0ff' : '#ff0055';
                ctx.lineWidth = 3;
                ctx.beginPath();
                // Using standard rect for broader compatibility
                ctx.rect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.fill(); ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#121232';
                ctx.strokeStyle = '#697cb6';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.rect(-this.w/3, -this.h/5, (this.w/3)*2, this.h/2.2);
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.fillRect(-this.w/2+4, -this.h/2, 6, 3);
                ctx.fillRect(this.w/2-10, -this.h/2, 6, 3);
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.w = 42; this.h = 82;
                const lanes = [75, 175, 275, 365];
                this.x = lanes[Math.floor(Math.random() * lanes.length)];
                this.y = -100;
                this.vShift = Math.random() * 2 + 2;
                const colors = ['#00f0ff', '#7a00ff', '#ffeb3b', '#00ff66'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() { this.y += this.vShift + (speed * 0.07); }
            draw() {
                ctx.save();
                ctx.shadowBlur = 12; ctx.shadowColor = this.color;
                ctx.fillStyle = '#080814';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.w, this.h);
                ctx.fill(); ctx.stroke();
                ctx.restore();
            }
        }

        class Building {
            constructor(side) {
                this.side = side;
                this.w = Math.random() * 30 + 20;
                this.h = Math.random() * 60 + 40;
                this.x = side === 'left' ? Math.random() * 20 : gameWidth - this.w - Math.random() * 20;
                this.y = -this.h;
                this.color = Math.random() < 0.5 ? 'rgba(255, 0, 85, 0.15)' : 'rgba(0, 240, 255, 0.15)';
                this.strokeColor = Math.random() < 0.5 ? '#ff0055' : '#00f0ff';
            }
            update() { this.y += speed * 0.08; }
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.strokeStyle = this.strokeColor;
                ctx.lineWidth = 1;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeRect(this.x, this.y, this.w, this.h);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, vy, size) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.random() * 2 - 1; this.vy = vy;
                this.alpha = 1; this.size = size;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.05; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        function restartGame() {
            player = new Player();
            enemies = []; particles = []; buildings = [];
            score = 0; speed = 0; nitro = 100;
            gameActive = true;
            document.getElementById('gameover-screen').classList.add('hidden');
        }

        function triggerCrash() {
            gameActive = false;
            screenShake = 25;
            if(engineGain) engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            document.getElementById('final-score-lbl').innerText = `FINAL SCORE: ${Math.floor(score)}`;
            document.getElementById('gameover-screen').classList.remove('hidden');
        }

        function render() {
            ctx.clearRect(0,0, gameWidth, gameHeight);

            ctx.save();
            if(screenShake > 0) {
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
                screenShake *= 0.9;
            }

            if(gameActive) {
                isNitro = controls.nitro && nitro > 1;
                if(isNitro) { targetSpeed = 240; nitro -= 0.5; screenShake = Math.max(screenShake, 1.5); }
                else { targetSpeed = 140; if(nitro < 100) nitro += 0.1; }

                speed += (targetSpeed - speed) * 0.06;
                score += (speed * 0.01);
                roadOffset += (speed * 0.08);

                if(engineOsc) {
                    engineOsc.frequency.setValueAtTime(35 + (speed/240)*150, audioCtx.currentTime);
                    engineGain.gain.setValueAtTime(0.01 + (speed/240)*0.03, audioCtx.currentTime);
                }

                document.getElementById('score-txt').innerText = String(Math.floor(score)).padStart(5, '0');
                document.getElementById('speed-txt').innerText = `${Math.floor(speed)} KMH`;
            } else {
                speed += (0 - speed) * 0.08;
                roadOffset += (speed * 0.08);
            }

            if(gameActive && Math.random() < 0.04 && buildings.length < 15) {
                buildings.push(new Building(Math.random() < 0.5 ? 'left' : 'right'));
            }
            for(let i = buildings.length-1; i >= 0; i--) {
                buildings[i].update(); buildings[i].draw();
                if(buildings[i].y > gameHeight) buildings.splice(i, 1);
            }

            ctx.fillStyle = '#080816';
            ctx.fillRect(55, 0, gameWidth - 110, gameHeight);

            ctx.fillStyle = '#ff0055'; ctx.fillRect(52, 0, 3, gameHeight);
            ctx.fillStyle = '#00f0ff'; ctx.fillRect(gameWidth - 55, 0, 3, gameHeight);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            let lineY = roadOffset % 60;
            for(let y = -60; y < gameHeight; y += 60) {
                ctx.fillRect(gameWidth/2 - 3, y + lineY, 6, 30);
                ctx.fillRect(gameWidth/3 + 10, y + lineY, 2, 30);
                ctx.fillRect((gameWidth/3)*2 - 10, y + lineY, 2, 30);
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if(particles[i].alpha <= 0) particles.splice(i,1);
            }

            if(gameActive && Math.random() < 0.018 && enemies.length < 4) enemies.push(new Enemy());
            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update(); enemies[i].draw();

                if(gameActive && player &&
                   player.x < enemies[i].x + enemies[i].w - 5 &&
                   player.x + player.w > enemies[i].x + 5 &&
                   player.y < enemies[i].y + enemies[i].h - 5 &&
                   player.y + player.h > enemies[i].y + 5) {
                    
                    for(let k=0; k<30; k++) particles.push(new Particle(player.x+player.w/2, player.y+player.h/2, '#ffcc00', (Math.random()-0.5)*12, Math.random()*6+2));
                    triggerCrash();
                }

                if(enemies[i].y > gameHeight + 100) {
                    enemies.splice(i, 1);
                    if(gameActive) score += 25; 
                }
            }

            // FIX: Player will only draw if it exists
            if(player) {
                if(gameActive) player.update();
                player.draw();
            }

            ctx.restore();
            requestAnimationFrame(render);
        }

        // FIX: Initialize the player instantly so the game loop doesn't crash
        player = new Player();
        requestAnimationFrame(render);
    </script>
</body>
</html>
