<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON DRIVE - Premium Arcade Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 480px;
            height: 720px;
            box-shadow: 0 0 50px rgba(255, 0, 128, 0.3);
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a14;
        }

        canvas {
            display: block;
            background: #0c0c1e;
        }

        /* Premium Glassmorphism UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        p {
            color: #8fa0dd;
            font-size: 0.95rem;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.8);
        }

        /* Modern Realtime HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            pointer-events: none;
        }

        .hud-card {
            background: rgba(20, 20, 35, 0.6);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        .hud-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8fa0dd;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        #nitro-bar-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            z-index: 5;
            overflow: hidden;
        }

        #nitro-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #ff007f);
            box-shadow: 0 0 10px #00f0ff;
            transition: width 0.1s linear;
        }

        .instructions {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-card">
                <div class="hud-label">SCORE</div>
                <div id="score-val" class="hud-value">00000</div>
            </div>
            <div class="hud-card" style="text-align: right;">
                <div class="hud-label">SPEED</div>
                <div id="speed-val" class="hud-value">0 KM/H</div>
            </div>
        </div>

        <!-- Nitro Bar -->
        <div id="nitro-bar-container">
            <div id="nitro-bar"></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>NEON DRIVE</h1>
            <p>Ultimate Cyberpunk Endless Racer</p>
            <button class="btn" onclick="startGame()">Drive Now</button>
            <div class="instructions">
                <p style="margin-bottom:0; font-size:0.85rem; color:#aaa;">
                    Use <b>ARROW KEYS</b> or <b>A / D</b> to Steer.<br>
                    Hold <b>SPACEBAR</b> for Premium Nitro Boost.
                </p>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="overlay hidden">
            <h1 style="background: linear-gradient(45deg, #ff0000, #ff7f00);">CRASHED</h1>
            <p>Your vehicle was decimated.<br>Final Score: <span id="final-score" style="color:#00f0ff; font-weight:bold;">0</span></p>
            <button class="btn" onclick="startGame()">Restart</button>
        </div>

        <canvas id="gameCanvas" width="480" height="720"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Variables
        let gameActive = false;
        let score = 0;
        let speed = 0;
        let targetSpeed = 0;
        const maxNormalSpeed = 160;
        const maxNitroSpeed = 260;
        let odometer = 0;
        let nitroLevel = 100;
        let isNitroActive = false;
        let screenShake = 0;

        // Entities arrays
        let player;
        let enemies = [];
        let particles = [];
        let lines = [];

        // Controls state
        const keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false, Space: false };

        // Handle Inputs
        window.addEventListener('keydown', e => { 
            if(e.code in keys) keys[e.code] = true; 
            if(e.code === 'Space') e.preventDefault();
        });
        window.addEventListener('keyup', e => { if(e.code in keys) keys[e.code] = false; });

        // --- PREMIUM SYNTH SOUND ENGINE (Web Audio API) ---
        let audioCtx, engineOsc, engineGain;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(45, audioCtx.currentTime); // Deep rumbling engine
            
            // Audio Lowpass filter for smooth premium sound
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(220, audioCtx.currentTime);

            engineOsc.connect(filter);
            filter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            
            engineGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            engineOsc.start(0);
        }

        function updateEngineSound() {
            if (!audioCtx) return;
            let speedRatio = speed / maxNitroSpeed;
            // Modulate pitch and volume based on car acceleration
            engineOsc.frequency.setValueAtTime(45 + speedRatio * 160, audioCtx.currentTime);
            engineGain.gain.setValueAtTime(0.02 + speedRatio * 0.04, audioCtx.currentTime);
        }

        function playSoundFx(freq, type, duration, vol) {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(type === 'sawtooth') osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- CLASSES ---
        class PlayerCar {
            constructor() {
                this.width = 44;
                this.height = 80;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 140;
                this.vx = 0;
                this.targetAngle = 0;
                this.currentAngle = 0;
            }

            update() {
                // Smooth Movement Physics
                let moveDir = 0;
                if (keys.ArrowLeft || keys.KeyA) moveDir = -1;
                if (keys.ArrowRight || keys.KeyD) moveDir = 1;

                this.vx += moveDir * 0.8;
                this.vx *= 0.85; // Friction
                this.x += this.vx;

                // Visual Lean/Rotation effect while steering
                this.targetAngle = moveDir * 0.07;
                this.currentAngle += (this.targetAngle - this.currentAngle) * 0.1;

                // Constrain inside highway lanes
                if (this.x < 65) { this.x = 65; this.vx = 0; }
                if (this.x > canvas.width - 65 - this.width) { this.x = canvas.width - 65 - this.width; this.vx = 0; }

                // Exhaust Particle Spawning
                if (speed > 10 && Math.random() < 0.4) {
                    let pColor = isNitroActive ? '#00f0ff' : '#ff007f';
                    particles.push(new Particle(this.x + this.width/2 + (Math.random()*8-4), this.y + this.height, pColor, -speed*0.05, Math.random()*3+2));
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.currentAngle);

                // Premium Vehicle Vector Drawing with Neon Shadow Blur
                ctx.shadowBlur = 15;
                ctx.shadowColor = isNitroActive ? '#00f0ff' : '#ff007f';

                // Underglow
                ctx.fillStyle = isNitroActive ? 'rgba(0,240,255,0.3)' : 'rgba(255,0,127,0.3)';
                ctx.fillRect(-this.width/2-4, -this.height/2-4, this.width+8, this.height+8);

                // Main Chassis
                ctx.fillStyle = '#111125';
                ctx.strokeStyle = isNitroActive ? '#00f0ff' : '#ff007f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 8);
                ctx.fill();
                ctx.stroke();

                // Windshield & Glass cabin
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#050510';
                ctx.strokeStyle = '#8fa0dd';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(-this.width/3, -this.height/4, (this.width/3)*2, this.height/2, 4);
                ctx.fill();
                ctx.stroke();

                // Headlights (Neon Cyan/White)
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.fillRect(-this.width/2 + 4, -this.height/2, 8, 4);
                ctx.fillRect(this.width/2 - 12, -this.height/2, 8, 4);

                // Brake Lights
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.fillRect(-this.width/2 + 6, this.height/2 - 3, 6, 3);
                ctx.fillRect(this.width/2 - 12, this.height/2 - 3, 6, 3);

                ctx.restore();
            }
        }

        class EnemyCar {
            constructor() {
                this.width = 44;
                this.height = 80;
                // Randomly choose one of 3 lanes
                const lanes = [80, 190, 300];
                this.x = lanes[Math.floor(Math.random() * lanes.length)] + (Math.random()*30 - 15);
                this.y = -100;
                this.baseSpeed = Math.random() * 3 + 2;
                // Neon Theme Palette for Enemy Cars
                const neonColors = ['#00f0ff', '#7f00ff', '#ffeb3b', '#00ff00', '#ff9800'];
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
            }

            update() {
                // Position shifts relative to Player speed
                this.y += this.baseSpeed + (speed * 0.08);
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                
                ctx.fillStyle = '#111125';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5;
                
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 6);
                ctx.fill();
                ctx.stroke();

                // Cockpit
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(this.x + 8, this.y + 25, this.width - 16, 25);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, vy, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = Math.random() * 2 - 1;
                this.vy = vy;
                this.alpha = 1;
                this.size = size;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.04;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- GAME SYSTEM FUNCTIONS ---

        function startGame() {
            initAudio();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('gameover-screen').classList.add('hidden');
            
            // Reset configurations
            player = new PlayerCar();
            enemies = [];
            particles = [];
            score = 0;
            speed = 0;
            odometer = 0;
            nitroLevel = 100;
            gameActive = true;
            
            // Initialize road lines
            lines = [];
            for (let i = -50; i < canvas.height; i += 80) {
                lines.push(i);
            }
        }

        function gameOver() {
            gameActive = false;
            screenShake = 30;
            playSoundFx(80, 'sawtooth', 0.8, 0.3); // Heavy crash sound explosion
            if(engineGain) engineGain.gain.setValueAtTime(0, audioCtx.currentTime);

            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('gameover-screen').classList.remove('hidden');
        }

        // Optimized Standard Box Collision with internal padding for precision gameplay
        function checkCollision(rect1, rect2) {
            const padding = 6; 
            return (
                rect1.x + padding < rect2.x + rect2.width - padding &&
                rect1.x + rect1.width - padding > rect2.x + padding &&
                rect1.y + padding < rect2.y + rect2.height - padding &&
                rect1.y + rect1.height - padding > rect2.y + padding
            );
        }

        // --- CORE GAME ENGINE LOOP ---
        function update(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Handle Camera/Screen Shake Matrix
            ctx.save();
            if (screenShake > 0) {
                let dx = (Math.random() - 0.5) * screenShake;
                let dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.9; // Dampening
            }

            if (gameActive) {
                // Handling Acceleration and Nitro Mechanic
                isNitroActive = keys.Space && nitroLevel > 1;
                if (isNitroActive) {
                    targetSpeed = maxNitroSpeed;
                    nitroLevel -= 0.6; // Burn fuel
                    screenShake = Math.max(screenShake, 2); // Constant tiny vibrate
                } else {
                    targetSpeed = maxNormalSpeed;
                    if (nitroLevel < 100) nitroLevel += 0.15; // Regenerate nitro
                }

                // Smooth Linear Interpolation for speed changes
                speed += (targetSpeed - speed) * 0.05;
                odometer += speed * 0.01;
                score += (speed / 60);

                // HUD updates
                document.getElementById('score-val').innerText = String(Math.floor(score)).padStart(5, '0');
                document.getElementById('speed-val').innerText = `${Math.floor(speed)} KM/H`;
                document.getElementById('nitro-bar').style.width = `${nitroLevel}%`;

                updateEngineSound();
            } else {
                speed += (0 - speed) * 0.1;
            }

            // DRAW ENVIRONMENT: Scrolling Cyberpunk Highway Road Layout
            ctx.fillStyle = '#0f0f26'; // Highway asphalt color
            ctx.fillRect(50, 0, canvas.width - 100, canvas.height);

            // Glowing Purple Side Borders
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#7f00ff';
            ctx.fillStyle = '#7f00ff';
            ctx.fillRect(46, 0, 4, canvas.height);
            ctx.fillRect(canvas.width - 50, 0, 4, canvas.height);
            ctx.shadowBlur = 0;

            // Update & Draw Dashed Lane Marks (Animate downward relative to speed)
            ctx.fillStyle = 'rgba(0, 240, 255, 0.6)'; // Cyber cyan lines
            for (let i = 0; i < lines.length; i++) {
                if (gameActive) {
                    lines[i] += speed * 0.1;
                    if (lines[i] > canvas.height) lines[i] = -80;
                }
                ctx.fillRect(175, lines[i], 6, 40);
                ctx.fillRect(295, lines[i], 6, 40);
            }

            // --- PARTICLES ENGINE ---
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // --- ENEMIES LOGIC ENGINE ---
            if (gameActive && Math.random() < 0.02 && enemies.length < 4) {
                enemies.push(new EnemyCar());
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                enemies[i].draw();

                // Check fatal collision
                if (gameActive && checkCollision(player, enemies[i])) {
                    // Create explosion particles on impact
                    for(let p=0; p<25; p++) {
                        particles.push(new Particle(player.x+player.width/2, player.y+player.height/2, '#ff3300', (Math.random()-0.5)*15, Math.random()*5+3));
                    }
                    gameOver();
                }

                // Delete outside view cars
                if (enemies[i].y > canvas.height + 100) {
                    enemies.splice(i, 1);
                    if(gameActive) score += 50; // Bonus score for clean overtakes
                }
            }

            // --- PLAYER DRAW & UPDATE ---
            if (gameActive) player.update();
            player.draw();

            ctx.restore(); // Restore shake matrix canvas shift
            requestAnimationFrame(update);
        }

        // Fire up frame loop
        requestAnimationFrame(update);
    </script>
</body>
</html>
