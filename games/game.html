<style>
    /* Premium Gaming Theme Variables */
    :root {
        --neon-cyan: #00f3ff;
        --neon-purple: #bc13fe;
        --dark-bg: #0b0c10;
        --container-bg: #1f2833;
        --text-light: #c5c6c7;
        --text-white: #ffffff;
    }

    body {
        background-color: var(--dark-bg);
        color: var(--text-white);
        font-family: 'Arial', sans-serif;
    }

    /* Premium Container with Glowing Borders */
    .game-showcase-container {
        max-width: 800px;
        margin: 60px auto;
        padding: 40px;
        background: var(--container-bg);
        border-radius: 20px;
        position: relative;
        /* Side light effect */
        box-shadow: -10px 0 40px rgba(0, 243, 255, 0.15), 
                    10px 0 40px rgba(188, 19, 254, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
    }

    /* Animated Top Border */
    .game-showcase-container::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        animation: borderGlow 3s infinite alternate;
    }

    @keyframes borderGlow {
        0% { opacity: 0.5; filter: brightness(1); }
        100% { opacity: 1; filter: brightness(1.5); }
    }

    .page-title {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Game List Grid */
    .game-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    /* Individual Game Card */
    .game-card {
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.4);
        padding: 15px 25px;
        border-radius: 15px;
        text-decoration: none;
        color: var(--text-white);
        border-left: 4px solid transparent;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
    }

    .game-card:hover {
        transform: translateX(10px);
        background: rgba(255, 255, 255, 0.05);
        border-left: 4px solid var(--neon-cyan);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }

    /* Hover Overlay Effect */
    .game-card::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
        transform: skewX(-25deg);
        transition: 0.5s;
    }
    
    .game-card:hover::after {
        left: 150%;
    }

    /* Game Logo Wrapper */
    .game-logo-wrapper {
        width: 70px;
        height: 70px;
        border-radius: 12px;
        overflow: hidden;
        margin-right: 25px;
        flex-shrink: 0;
        border: 2px solid rgba(255,255,255,0.1);
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .game-logo-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Text Information */
    .game-info h2 {
        margin: 0 0 8px 0;
        font-size: 1.5rem;
        transition: color 0.3s;
    }

    .game-card:hover .game-info h2 {
        color: var(--neon-cyan);
    }

    .game-info p {
        margin: 0;
        color: var(--text-light);
        font-size: 0.95rem;
    }

    /* Disabled/Empty Card Style */
    .game-card.disabled {
        cursor: not-allowed;
        opacity: 0.6;
        border-left: 4px solid #555;
    }

    .game-card.disabled:hover {
        transform: none;
        background: rgba(0, 0, 0, 0.4);
        border-left: 4px solid #555;
    }

    .game-card.disabled .game-logo-wrapper {
        background-color: #222;
        color: #666;
        font-size: 24px;
        font-weight: bold;
    }
</style>
