<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archer Gaming Zone</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Body Styling with Animated-like Gradient Background */
        body {
            background: radial-gradient(circle at center, #1f4068 0%, #162447 50%, #0f172a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Main Glassmorphism Container */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(0, 242, 254, 0.1);
            width: 100%;
            max-width: 550px;
            position: relative;
        }

        /* Decorative Glowing Top Bar */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00f2fe, #4facfe, transparent);
            border-radius: 0 0 10px 10px;
        }

        /* Header Area with Main Logo */
        .header-section {
            margin-bottom: 35px;
        }

        .main-logo {
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            font-weight: 800;
        }

        p.subtitle {
            color: #708090;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Game List Wrapper */
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Game Item Link Styling */
        .game-card {
            text-decoration: none;
            color: white;
            background: rgba(15, 23, 42, 0.6);
            padding: 20px 25px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* Left Side Content (Logo + Text) */
        .card-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* SVG Logo Container inside Card */
        .game-icon-box {
            background: rgba(0, 242, 254, 0.1);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }

        .game-icon-box svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: #00f2fe;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        /* Text Details */
        .game-info {
            text-align: left;
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        .game-meta {
            font-size: 0.8rem;
            color: #00f2fe;
            opacity: 0.7;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right Side Badge */
        .play-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .game-card:hover {
            background: rgba(0, 242, 254, 0.08);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.15);
        }

        .game-card:hover .game-icon-box {
            background: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        .game-card:hover .game-icon-box svg {
            stroke: #162447;
        }

        .game-card:hover .game-title {
            color: #00f2fe;
        }

        .game-card:hover .play-badge {
            background: #00f2fe;
            color: #162447;
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        /* Footer Info */
        .footer-text {
            margin-top: 35px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
