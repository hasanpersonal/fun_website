<!-- Font Awesome CDN Link -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* ==========================================================================
       ১. প্রিমিয়াম গেমিং থিম ভেরিয়েবলস ও রিসেট
       ========================================================================== */
    :root {
        --neon-cyan: #00f3ff;
        --neon-purple: #bc13fe;
        --bg-dark-1: #0b0d14;
        --bg-dark-2: #1a1d29;
        --card-bg: rgba(20, 24, 36, 0.7);
        --card-bg-hover: rgba(32, 38, 57, 0.9);
        --text-primary: #ffffff;
        --text-muted: #94a3b8;
    }

    body {
        background: radial-gradient(circle at top center, var(--bg-dark-2), var(--bg-dark-1));
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        box-sizing: border-box;
    }

    /* ==========================================================================
       ২. মেইন কন্টেইনার (গ্লাস-মরফিজম ও নিয়ন গ্লো)
       ========================================================================== */
    .game-showcase-container {
        width: 100%;
        max-width: 650px;
        background: rgba(15, 18, 28, 0.75);
        border-radius: 24px;
        padding: 40px 30px;
        position: relative;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                    -10px 0 40px rgba(0, 243, 255, 0.08), 
                    10px 0 40px rgba(188, 19, 254, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    /* টপ নিয়ন বর্ডার অ্যানিমেশন */
    .game-showcase-container::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        animation: pulseGlow 3s infinite alternate;
    }

    @keyframes pulseGlow {
        0% { opacity: 0.5; filter: brightness(1); }
        100% { opacity: 1; filter: brightness(1.6); }
    }

    /* টাইটেল স্টাইল */
    .page-title {
        text-align: center;
        font-size: 2.4rem;
        margin-top: 0;
        margin-bottom: 35px;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 900;
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 8px rgba(0, 243, 255, 0.2));
    }

    /* ==========================================================================
       ৩. গেম কার্ডস (લિસ્ટ এবং গ্রিড লেআউট)
       ========================================================================== */
    .game-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .game-card {
        display: flex;
        align-items: center;
        background: var(--card-bg);
        padding: 16px 24px;
        border-radius: 16px;
        text-decoration: none;
        color: var(--text-primary);
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-left: 4px solid transparent;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
    }

    /* হোভার ইফেক্ট */
    .game-card:not(.disabled):hover {
        transform: translateX(8px) scale(1.01);
        background: var(--card-bg-hover);
        border-left: 4px solid var(--neon-cyan);
        border-top-color: rgba(0, 243, 255, 0.1);
        border-bottom-color: rgba(0, 243, 255, 0.1);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 
                    0 0 15px rgba(0, 243, 255, 0.1);
    }

    /* কার্ডের লাইট রিফ্লেকশন ইফেক্ট */
    .game-card::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
        transform: skewX(-25deg);
        transition: 0.6s;
    }
    
    .game-card:not(.disabled):hover::after {
        left: 150%;
    }

    /* ==========================================================================
       ৪. আইকন এবং টেক্সট ইনফো
       ========================================================================== */
    .logo-wrapper {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        margin-right: 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        color: #ffffff;
        transition: transform 0.3s ease;
    }

    .game-card:not(.disabled):hover .logo-wrapper {
        transform: scale(1.1) rotate(5deg);
    }

    /* গেমের কালার গ্রেডিয়েন্ট */
    .bg-archer {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        box-shadow: 0 4px 15px rgba(255, 65, 108, 0.35);
    }

    .bg-car {
        background: linear-gradient(135deg, #00b4db, #0083b0);
        box-shadow: 0 4px 15px rgba(0, 180, 219, 0.35);
    }

    .bg-empty {
        background: rgba(255, 255, 255, 0.03);
        border: 2px dashed rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.3);
    }

    /* টেক্সট সেটিংস */
    .game-info {
        flex-grow: 1;
    }

    .game-info h2 {
        margin: 0;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        transition: color 0.3s;
    }

    .game-info p {
        margin: 4px 0 0 0;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .game-card:not(.disabled):hover .game-info h2 {
        color: var(--neon-cyan);
    }

    /* অ্যাকশন অ্যারো (>) আইকন */
    .action-arrow {
        color: var(--text-muted);
        font-size: 0.9rem;
        opacity: 0;
        transform: translateX(-10px);
        transition: all 0.3s ease;
    }

    .game-card:not(.disabled):hover .action-arrow {
        opacity: 1;
        transform: translateX(0);
        color: var(--neon-cyan);
    }

    /* ==========================================================================
       ৫. লকড/কামিং সুন স্লট স্টাইল (Holographic Pulse)
       ========================================================================== */
    .game-card.disabled {
        cursor: not-allowed;
        opacity: 0.5;
        background: rgba(10, 12, 18, 0.4);
        animation: breathing 4s ease-in-out infinite alternate;
    }

    @keyframes breathing {
        0% { opacity: 0.4; }
        100% { opacity: 0.6; }
    }

    .game-card.disabled .game-info p {
        color: rgba(255, 255, 255, 0.2);
    }

    /* রেসপন্সিভ মোবাইল ডিজাইন */
    @media (max-width: 480px) {
        .game-showcase-container {
            padding: 30px 20px;
        }
        .page-title {
            font-size: 1.8rem;
        }
        .game-card {
            padding: 14px 16px;
        }
        .logo-wrapper {
            margin-right: 15px;
        }
    }
</style>
