<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* ==========================================================================
       ১. থিম আইসোলেশন এবং রিসেট (যাতে মেইন থিম কোড নষ্ট না করতে পারে)
       ========================================================================== */
    .gz-main-wrapper, .gz-main-wrapper * {
        box-sizing: border-box !important;
    }

    .gz-main-wrapper {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
        width: 100% !important;
        max-width: 450px !important; /* মোবাইলের জন্য পারফেক্ট সাইড স্পেসিং */
        margin: 20px auto !important;
        padding: 10px !important;
    }

    /* ==========================================================================
       ২. প্রিমিয়াম গ্লাস কন্টেইনার
       ========================================================================== */
    .gz-card-box {
        background: #a9a9a9 !important; /* সলিড ডার্ক কালার যাতে টেক্সট ক্লিয়ার দেখা যায় */
        border-radius: 24px !important;
        padding: 30px 20px !important;
        position: relative !important;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        text-align: center !important;
    }

    /* টপ নিয়ন গ্লো লাইন */
    .gz-card-box::before {
        content: "" !important;
        position: absolute !important;
        top: 0 !important; left: 0 !important; right: 0 !important;
        height: 3px !important;
        background: linear-gradient(90deg, #00f0ff, #d946ef) !important;
        border-top-left-radius: 24px !important;
        border-top-right-radius: 24px !important;
    }

    /* টাইটেল */
    .gz-main-title {
        font-size: 1.8rem !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 2px !important;
        margin: 0 0 25px 0 !important;
        background: linear-gradient(135deg, #00f0ff, #d946ef) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        display: block !important;
    }

    /* ==========================================================================
       ৩. গেম লিস্ট ও আল্ট্রা প্রিমিয়াম কার্ডস
       ========================================================================== */
    .gz-list-stack {
        display: flex !important;
        flex-direction: column !important;
        gap: 14px !important;
        margin-bottom: 25px !important;
    }

    .gz-game-item {
        display: flex !important;
        align-items: center !important;
        background: rgba(255, 255, 255, 0.04) !important;
        padding: 12px 16px !important;
        border-radius: 16px !important;
        text-decoration: none !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
        transition: all 0.25s ease-in-out !important;
    }

    /* হোভার করলে গ্লো এবং স্লাইট আপ ইফেক্ট */
    .gz-game-item:not(.gz-locked):hover {
        background: rgba(255, 255, 255, 0.08) !important;
        transform: translateY(-2px) !important;
        border-color: rgba(0, 240, 255, 0.3) !important;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4) !important;
    }

    /* আইকন বক্স */
    .gz-icon-plate {
        width: 46px !important;
        height: 46px !important;
        border-radius: 12px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        font-size: 18px !important;
        color: #ffffff !important;
        flex-shrink: 0 !important;
    }

    .gz-bg-archer { background: linear-gradient(135deg, #ff416c, #ff4b2b) !important; }
    .gz-bg-car { background: linear-gradient(135deg, #00b4db, #0083b0) !important; }
    .gz-bg-lock { 
        background: rgba(255, 255, 255, 0.02) !important; 
        border: 1.5px dashed rgba(255, 255, 255, 0.15) !important;
        color: rgba(255, 255, 255, 0.3) !important;
    }

    /* টেক্সট কন্টেন্ট (ফোর্স ভিজিবিলিটি) */
    .gz-info-holder {
        margin-left: 14px !important;
        text-align: left !important;
        flex-grow: 1 !important;
    }

    .gz-game-name {
        margin: 0 !important;
        font-size: 1.05rem !important;
        font-weight: 600 !important;
        color: #ffffff !important; /* লেখা ফুটিয়ে তোলার জন্য ফিক্সড হোয়াইট */
        display: block !important;
        line-height: 1.3 !important;
    }

    .gz-game-desc {
        margin: 3px 0 0 0 !important;
        font-size: 0.8rem !important;
        color: #94a3b8 !important;
        display: block !important;
    }

    /* রাইট অ্যারো */
    .gz-arrow {
        color: rgba(255, 255, 255, 0.2) !important;
        font-size: 0.85rem !important;
    }

    .gz-game-item:hover .gz-arrow {
        color: #00f0ff !important;
    }

    /* লকড স্টাইল */
    .gz-locked {
        cursor: not-allowed !important;
        opacity: 0.5 !important;
    }

    /* ==========================================================================
       ৪. হোম বাটন এবং ফুটার ডিজাইন
       ========================================================================== */
    .gz-btn-home {
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 8px !important;
        background: rgba(0, 240, 255, 0.1) !important;
        color: #00f0ff !important;
        border: 1px solid rgba(0, 240, 255, 0.2) !important;
        padding: 12px 24px !important;
        border-radius: 30px !important;
        font-size: 0.95rem !important;
        font-weight: 600 !important;
        text-decoration: none !important;
        transition: all 0.2s !important;
        margin-bottom: 25px !important;
    }

    .gz-btn-home:hover {
        background: #00f0ff !important;
        color: #111524 !important;
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.4) !important;
    }

    .gz-footer-text {
        font-size: 0.85rem !important;
        color: #64748b !important;
        margin: 0 !important;
        display: block !important;
    }

    .gz-footer-text strong {
        color: #94a3b8 !important;
    }

    .gz-tag {
        display: inline-block !important;
        font-size: 0.75rem !important;
        color: #475569 !important;
        margin-top: 5px !important;
        font-weight: 700 !important;
    }
</style>
