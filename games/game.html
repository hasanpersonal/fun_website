<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    /* ==========================================================================
       ১. গ্লোবাল রিসেট এবং প্রিমিয়াম কালার স্কিম
       ========================================================================== */
    .game-page-wrapper, .game-page-wrapper * {
        box-sizing: border-box;
    }

    :root {
        --neon-blue: #00f0ff;
        --neon-purple: #d946ef;
        --card-bg: rgba(17, 24, 39, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-white: #ffffff;
        --text-slate: #94a3b8;
    }

    /* মেইন পেজ র‍্যাপার - যা স্ক্রিন ব্লিডিং বা কেটে যাওয়া রোধ করবে */
    .game-page-wrapper {
        font-family: 'Poppins', sans-serif;
        width: 100%;
        max-width: 480px; /* মোবাইলের জন্য পারফেক্ট সাইড-ফিটিং */
        margin: 0 auto;
        padding: 15px;
    }

    /* ==========================================================================
       ২. মেইন গ্লাস কন্টেইনার
       ========================================================================== */
    .game-showcase-container {
        background: rgba(11, 15, 26, 0.85);
        border-radius: 24px;
        padding: 30px 20px;
        position: relative;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 30px rgba(0, 240, 255, 0.05);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }

    /* প্রিমিয়াম টপ গ্লো বর্ডার */
    .game-showcase-container::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
    }

    /* টাইটেল ডিজাইন */
    .page-title {
        text-align: center;
        font-size: 1.8rem;
        margin-top: 0;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* ==========================================================================
       ৩. রেস্পন্সিভ গেম কার্ডস
       ========================================================================== */
    .game-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .game-card {
        display: flex;
        align-items: center;
        background: var(--card-bg);
        padding: 12px 16px;
        border-radius: 16px;
        text-decoration: none;
        color: var(--text-white);
        border: 1px solid var(--card-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    /* হোভার ইফেক্ট */
    .game-card:not(.disabled):hover {
        transform: translateY(-2px);
        background: rgba(31, 41, 55, 0.8);
        border-color: rgba(0, 240, 255, 0.3);
        box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3),
                    0 0 15px rgba(0, 240, 255, 0.1);
    }

    /* ==========================================================================
       ৪. আইকন ও টেক্সট লেআউট (নো-র‍্যাপিং প্রোটেকশন)
       ========================================================================== */
    .logo-wrapper {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        flex-shrink: 0; /* আইকন যেন ছোট স্ক্রিনে চেপে না যায় */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #ffffff;
    }

    /* গেম ভিত্তিক ডাইনামিক ম্যাশড কালার */
    .bg-archer {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        box-shadow: 0 4px 12px rgba(255, 65, 108, 0.3);
    }

    .bg-car {
        background: linear-gradient(135deg, #00b4db, #0083b0);
        box-shadow: 0 4px 12px rgba(0, 180, 219, 0.3);
    }

    .bg-empty {
        background: rgba(255, 255, 255, 0.03);
        border: 1.5px dashed rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.25);
    }

    /* টেক্সট সেটিংস */
    .game-info {
        margin-left: 14px;
        flex-grow: 1;
        min-width: 0; /* টেক্সট ট্রাঙ্কেশন বা সেফটি ম্যানেজমেন্টের জন্য */
    }

    .game-info h2 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis; /* নাম খুব বড় হলে কেটে সুন্দর ডট ডট হবে */
        transition: color 0.2s;
    }

    .game-info p {
        margin: 2px 0 0 0;
        font-size: 0.78rem;
        color: var(--text-slate);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .game-card:not(.disabled):hover .game-info h2 {
        color: var(--neon-blue);
    }

    /* রাইট চ্যাভরন অ্যারো */
    .action-arrow {
        color: rgba(255, 255, 255, 0.2);
        font-size: 0.85rem;
        margin-left: 8px;
        transition: all 0.2s;
    }

    .game-card:not(.disabled):hover .action-arrow {
        color: var(--neon-blue);
        transform: translateX(3px);
    }

    /* ==========================================================================
       ৫. লকড বা নিষ্ক্রিয় কার্ড স্টাইল
       ========================================================================== */
    .game-card.disabled {
        cursor: not-allowed;
        opacity: 0.45;
    }
</style>
