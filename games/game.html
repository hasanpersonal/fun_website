---
layout: default
title: Game Zone
---

<!-- Font Awesome CDN Link -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Premium Gaming Theme Variables */
    :root {
        --neon-cyan: #00f3ff;
        --neon-purple: #bc13fe;
        --bg-gradient-1: #23273a; /* Dark premium bluish-grey */
        --bg-gradient-2: #0b0d14;
        --container-bg: rgba(31, 40, 51, 0.85);
        --text-white: #ffffff;
    }

    body {
        background: radial-gradient(circle at top center, var(--bg-gradient-1), var(--bg-gradient-2));
        background-attachment: fixed;
        color: var(--text-white);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    /* Premium Container with Glowing Side Borders */
    .game-showcase-container {
        max-width: 700px;
        margin: 50px auto;
        padding: 30px;
        background: var(--container-bg);
        border-radius: 16px;
        position: relative;
        box-shadow: -12px 0 35px rgba(0, 243, 255, 0.12), 
                    12px 0 35px rgba(188, 19, 254, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
    }

    /* Animated Top Border */
    .game-showcase-container::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        animation: borderGlow 3s infinite alternate;
    }

    @keyframes borderGlow {
        0% { opacity: 0.4; filter: brightness(1); }
        100% { opacity: 1; filter: brightness(1.5); }
    }

    .page-title {
        text-align: center;
        font-size: 2.2rem;
        margin-top: 0;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        background: linear-gradient(to right, #00f3ff, #bc13fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    /* Game List Grid */
    .game-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Individual Game Card */
    .game-card {
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.25);
        padding: 10px 20px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-white);
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        height: 60px;
    }

    .game-card:hover {
        transform: translateX(8px);
        background: rgba(255, 255, 255, 0.08);
        border-left: 3px solid var(--neon-cyan);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
    }

    /* Hover Overlay Effect */
    .game-card::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
        transform: skewX(-25deg);
        transition: 0.5s;
    }
    
    .game-card:hover::after {
        left: 150%;
    }

    /* Font Awesome Logo Base Wrapper */
    .logo-wrapper {
        width: 45px;
        height: 45px;
        border-radius: 10px;
        margin-right: 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px; /* Adjusts the Font Awesome icon size */
        color: #ffffff;
    }

    /* 1. Premium Archer Background */
    .bg-archer {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        box-shadow: 0 0 12px rgba(255, 65, 108, 0.4);
    }

    /* 2. Premium Car Background */
    .bg-car {
        background: linear-gradient(135deg, #00b4db, #0083b0);
        box-shadow: 0 0 12px rgba(0, 180, 219, 0.4);
    }

    /* 3. Empty Slot Premium Placeholder Background */
    .bg-empty {
        background: linear-gradient(135deg, #2b2e3b, #1a1c23);
        border: 2px dashed #4b526b;
        color: #717a99; /* Grey icon color */
    }

    /* Text Information */
    .game-info h2 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: color 0.3s;
    }

    .game-card:hover .game-info h2 {
        color: var(--neon-cyan);
    }

    /* Disabled/Empty Card Style */
    .game-card.disabled {
        cursor: not-allowed;
        opacity: 0.6;
    }

    .game-card.disabled:hover {
        transform: none;
        background: rgba(0, 0, 0, 0.25);
        border-left: 3px solid transparent;
        box-shadow: none;
    }

    .game-card.disabled:hover .game-info h2 {
        color: var(--text-white);
    }

</style>

<div class="game-showcase-container">
    <h1 class="page-title">Games Collection</h1>
    
    <div class="game-list">
        
        <!-- 1st Game: Archer -->
        <a href="archer.html" class="game-card">
            <div class="logo-wrapper bg-archer">
                <i class="fa-regular fa-bow-arrow"></i> <!-- Font Awesome Target Icon -->
            </div>
            <div class="game-info">
                <h2>Archer Game</h2>
            </div>
        </a>

        <!-- 2nd Game: Car -->
        <a href="car.html" class="game-card">
            <div class="logo-wrapper bg-car">
                <i class="fa-solid fa-car"></i> <!-- Font Awesome Car Icon -->
            </div>
            <div class="game-info">
                <h2>Car Game</h2>
            </div>
        </a>

        <!-- 3rd Game: Empty Slot -->
        <a href="#" class="game-card disabled">
            <div class="logo-wrapper bg-empty">
                <i class="fa-solid fa-question"></i> <!-- Font Awesome Question Mark -->
            </div>
            <div class="game-info">
                <h2>Coming Soon</h2>
            </div>
        </a>

        <!-- 4th Game: Empty Slot -->
        <a href="#" class="game-card disabled">
            <div class="logo-wrapper bg-empty">
                <i class="fa-solid fa-question"></i>
            </div>
            <div class="game-info">
                <h2>Coming Soon</h2>
            </div>
        </a>

    </div>
</div>
