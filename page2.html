---
layout: default
---
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2 - Video Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 750px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        h3 { color: #555; margin-top: 30px; margin-bottom: 10px; border-left: 5px solid #007bff; padding-left: 10px; text-align: left; }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-bottom: 20px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
<body>

    <div class="container">
        <h1>Video Gallery</h1>

        <h3>Test Video (Cloud)</h3>
        <div class="video-wrapper">
            <iframe src="https://drive.google.com/file/d/1_DqEImZwFDdV-Yezgam8ym8geK0Psbh8/view?usp=drivesdk"></iframe>
        </div>

        <h3>Test Video (YouTube)</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/iZtCsaP36SY" 
                    allowfullscreen>
            </iframe>
        </div>

        <a href="index.html" class="back-btn">Back to Main Page</a>
    </div>

</body>
</html>
