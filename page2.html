<style>
    /* Container Style */
    .video-container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .video-item {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px dashed #ccc;
    }

    .video-item:last-child {
        border-bottom: none;
    }

    .video-title {
        font-size: 1.2rem;
        color: #333;
        margin-bottom: 15px;
        display: block;
        font-weight: bold;
    }

    /* Video frame design */
    iframe {
        width: 100%;
        height: 315px;
        border-radius: 10px;
        border: none;
    }
</style>

<div class="video-container">
    <h1 style="margin-top: 0; color: #333;">My Video Collection</h1>
    <p style="color: #666; margin-bottom: 30px;">Ekhane amar bachai kora 3-ti video ache.</p>

    <div class="video-item">
        <span class="video-title">1. First Video Title</span>
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
    </div>

    <div class="video-item">
        <span class="video-title">2. Second Video Title</span>
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
    </div>

    <div class="video-item">
        <span class="video-title">3. Third Video Title</span>
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
    </div>
</div>
