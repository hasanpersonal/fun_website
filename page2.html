<style>
    /* --- EIKHANE EKBAR CHANGE KORLEI SHOB CHANGE HOBE --- */
    :root {
        --card-bg: #faf0e6;
        --card-border: #dddddd;
        --card-shadow: 0 4px 10px rgba(0,0,0,0.08);
        --card-radius: 12px;
        --title-color: #333333;
        --img-radius: 10px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .video-page-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
    }

    .main-title {
        text-align: center;
        color: var(--title-color);
        font-family: sans-serif;
        margin-bottom: 30px;
    }

    .video-card {
        margin-bottom: 40px;
        padding: 15px;
        border: 1px solid var(--card-border);
        border-radius: var(--card-radius);
        background: var(--card-bg);
        box-shadow: var(--card-shadow);
    }

    .video-card a {
        text-decoration: none;
    }

    .video-card h2 {
        font-size: 1.3rem;
        color: var(--title-color);
        font-family: sans-serif;
        margin-bottom: 15px;
    }

    /* Thumbnail container - Eikhane size control kora hoyeche */
    .thumbnail-box {
        position: relative;
        border-radius: var(--img-radius);
        overflow: hidden;
        background: #f0f0f0;
        text-align: center; /* Image ke majhkane rakhar jonno */
        padding: 10px 0;    /* Upore niche ektu khali jayga */
    }

    .thumbnail-box img {
        width: 80%;         /* <--- IMAGE SIZE EIKHANE KOMANO HOYECHE (100% THEKE 80%) */
        height: auto;
        display: inline-block;
        border-radius: var(--img-radius);
        transition: transform 0.3s ease;
    }

    .thumbnail-box img:hover {
        transform: scale(1.05); /* Mouse nile ektu boro hobe */
    }
</style>
