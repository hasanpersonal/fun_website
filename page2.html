<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2 - Video Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #333;
        }
                .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            margin-top: -30px; /* Video-ke upore uthanor jonno negative margin */
            background: black; /* Faka jayga kalo thakbe jate baje na dekhay */
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .back-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
    <h1>Welcome to Page 2</h1>
    <p>test video from google drive:</p>

    <div class="video-wrapper">
        <iframe src="https://drive.google.com/file/d/1_DqEImZwFDdV-Yezgam8ym8geK0Psbh8/preview"></iframe>
    </div>
    
    <a href="index.html" class="back-btn">Back to Main Page</a>
    </div>

        <br>
        <a href="index.html" class="back-btn">Back to Main Page</a>
    </div>

</body>
</html>
