<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Birthday Gift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* ভিডিওর মতো ডার্ক ব্যাকগ্রাউন্ড */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* মেইন কার্ড কন্টেইনার */
        .birthday-card {
            width: 600px;
            height: 400px;
            background: #fce4ec; /* লাইট পিঙ্ক ব্যাকগ্রাউন্ড */
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 4px solid #fff;
        }

        /* উপরের ডেকোরেশন/ব্যানার */
        .bunting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-image: radial-gradient(circle at 50% 0%, #f48fb1 15px, transparent 16px);
            background-size: 40px 40px;
            z-index: 10;
        }

        /* মেইন লেআউট (ভিডিওর CSS অনুযায়ী) */
        .content {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            padding-top: 3rem;
        }

        .content .left, .content .right {
            width: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content .right {
            width: 50%;
            padding-right: 20px;
        }

        /* হেডিং টেক্সট */
        .title {
            font-size: 2.5rem;
            color: #c2185b;
            text-shadow: 2px 2px #fff;
            margin-bottom: 20px;
            font-weight: 900;
            text-align: center;
            z-index: 2;
        }

        /* ব্যাজ স্টাইল */
        .badge {
            background: #fff;
            color: #d81b60;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #f48fb1;
            margin-bottom: 10px;
            transform: scale(0);
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ক্রমান্বয়ে পপ-আপ হওয়ার জন্য অ্যানিমেশন ডিলে */
        .name-badge { animation-delay: 1s; }
        .date-badge { animation-delay: 2s; }
        .cutie-badge { animation-delay: 3s; margin-top: 10px; }

        /* ডানদিকের কিউট ক্যারেক্টার */
        .character-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0);
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 2.5s;
        }

        .character {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        /* গিফট মেসেজ বক্স (যা শেষে ওপেন হবে) */
        .message-card {
            position: absolute;
            width: 85%;
            height: 75%;
            background: #ffffff;
            border-radius: 15px;
            top: 15%;
            left: 7.5%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 2px solid #f8bbd0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transform: scale(0);
            transform-origin: center;
            animation: openCard 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 4.5s; /* সব ব্যাজ দেখানোর পর এটি আসবে */
        }

        .card-header {
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .card-body {
            text-align: center;
        }

        .card-body p {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.4;
            margin-top: 10px;
        }

        .gift-images {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .gift-images img {
            width: 65px;
            height: 65px;
        }

        /* স্টার/হার্ট ডেকোরেশন (ভিডিওর CSS এর মতো) */
        .decorate_star {
            position: absolute;
            background: #f48fb1;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: scaleStar 2s infinite ease-in-out;
        }

        .star1 { width: 15px; height: 15px; top: 60px; right: 50px; animation-delay: 0.2s; }
        .star2 { width: 10px; height: 10px; bottom: 80px; left: 40px; animation-delay: 0.5s; }
        .star3 { width: 12px; height: 12px; top: 140px; left: 180px; animation-delay: 0.8s; }
        .star4 { width: 10px; height: 10px; bottom: 60px; right: 160px; animation-delay: 1.1s; }
        .star5 { width: 14px; height: 14px; bottom: 140px; right: 80px; animation-delay: 1.4s; }

        /* অ্যানিমেশন কী-ফ্রেমসমূহ */
        @keyframes popUp {
            to { transform: scale(1); }
        }

        @keyframes openCard {
            to { transform: scale(1); }
        }

        @keyframes scaleStar {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="birthday-card">
        <div class="bunting"></div>

        <div class="content">
            <div class="left">
                <h1 class="title">Happy Birthday</h1>
                <div class="badge name-badge">Oi Maruf</div>
                <div class="badge date-badge">06 March 1998</div>
            </div>

            <div class="right">
                <div class="character-wrapper">
                    <img class="character" src="https://media.tenor.com/968Yf0WvG3wAAAAi/peach-goma.gif" alt="Cute Bear">
                    <div class="badge cutie-badge">Cutie</div>
                </div>
            </div>

            <div class="message-card">
                <div class="card-header">To you... ❤️</div>
                <div class="card-body">
                    <div class="gift-images">
                        <img src="https://media.tenor.com/y267gS7Atm8AAAAi/cute-bear.gif" alt="Bear 1">
                        <img src="https://media.tenor.com/Yt3sc77vN80AAAAi/goma-happy-birthday.gif" alt="Bear 2">
                    </div>
                    <p>Today, I wish you all the best,<br>lots of health, and lots of joy.<br>I always hope...</p>
                </div>
            </div>
        </div>

        <div class="decorate_star star1"></div>
        <div class="decorate_star star2"></div>
        <div class="decorate_star star3"></div>
        <div class="decorate_star star4"></div>
        <div class="decorate_star star5"></div>
    </div>

</body>
</html>
