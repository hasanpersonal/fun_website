<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Velvet Deep Dark Background with Animated Mesh */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #030008;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 71, 126, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 180, 219, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(142, 68, 173, 0.08) 0%, transparent 60%);
            background-size: 200% 200%;
            animation: auroraDrive 15s ease infinite alternate;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        @keyframes auroraDrive {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .container {
            text-align: center;
            padding: 24px;
            max-width: 480px;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
            position: relative;
        }

        /* Ultra Premium Glassmorphic Box */
        #auth-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 60px 40px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #auth-section h2 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* Luxury Input Field */
        .code-input {
            width: 85%;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            outline: none;
            text-align: center;
            font-size: 26px;
            letter-spacing: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-weight: 600;
            margin-bottom: 35px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .code-input:focus {
            border-color: #ff477e;
            box-shadow: 
                inset 0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(255, 71, 126, 0.3);
            background: rgba(0, 0, 0, 0.75);
        }

        /* Premium Glowing Button */
        .base-btn {
            background: linear-gradient(135deg, #ff477e, #ff55a2);
            color: #fff;
            border: none;
            padding: 16px 50px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.35);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .base-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.55);
            background: linear-gradient(135deg, #ff55a2, #ff477e);
        }
        
        .base-btn:active {
            transform: translateY(-1px);
        }

        #error-msg {
            color: #ff5e5e;
            font-size: 13px;
            font-weight: 500;
            margin-top: 20px;
            display: none;
            text-shadow: 0 0 10px rgba(255, 94, 94, 0.3);
        }

        /* Proposal Section Setup */
        #proposal-section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Premium Dynamic Glow for I Love You */
        #dynamic-text {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #ffe3ec, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            opacity: 0;
            transform: scale(0.92);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
        }

        .text-reveal {
            opacity: 1 !important;
            transform: scale(1) !important;
            filter: drop-shadow(0 0 30px rgba(255, 71, 126, 0.65)) drop-shadow(0 0 60px rgba(255, 85, 162, 0.35)) !important;
        }

        /* Final Premium Screen */
        #final-screen {
            display: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .final-title {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            background: linear-gradient(135deg, #ff477e 0%, #ff85a2 50%, #ff477e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 10px 25px rgba(255, 71, 126, 0.4));
            animation: subtlePulse 3s ease-in-out infinite alternate;
        }

        @keyframes subtlePulse {
            0% { transform: scale(1); filter: drop-shadow(0 10px 25px rgba(255, 71, 126, 0.4)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 15px 35px rgba(255, 71, 126, 0.6)); }
        }

        .final-sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 3px;
            margin-top: 25px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Cinematic Premium Footer */
        .footer {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 1.2s ease 0.8s;
        }

        .footer span {
            color: #ff477e;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 71, 126, 0.4);
        }

        /* Luxury Cinematic Flowing Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 4.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(105vh) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-15vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Advanced Shake utility */
        .shake { animation: runShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes runShake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

    <!-- Passcode Interface -->
    <div class="container" id="auth-section">
        <h2>ENTER PRIVACY CODE</h2>
        <input type="password" id="passcode" class="code-input" placeholder="••••••" maxlength="6" onkeydown="if(event.key === 'Enter') verifyCode()">
        <br>
        <button class="base-btn" onclick="verifyCode()">UNLOCK</button>
        <p id="error-msg">Incorrect Code. Try again! 😉</p>
    </div>

    <!-- Proposal / Text Reveal Interface -->
    <div class="container" id="proposal-section">
        <h1 id="dynamic-text">I Love You</h1>
    </div>

    <!-- Final Beautiful Destination Page -->
    <div class="container" id="final-screen">
        <h1 class="final-title">Be My Forever? ❤️</h1>
        <p class="final-sub">Every second is better with you.</p>
    </div>

    <!-- Imrul's Premium Footer -->
    <div class="footer" id="imrul-footer">
        Designed by <span>Imrul Hasan</span>
    </div>

    <script>
        // DURATION CONFIGURATION (Ekhane shomoy change korba - Millisecond hishebe)
        const textDisplayDuration = 3000; // 'I Love You' text-ti koto kkhon glowing thakbe (3 Seconds)

        function verifyCode() {
            const code = document.getElementById('passcode').value.trim();
            const auth = document.getElementById('auth-section');
            const proposal = document.getElementById('proposal-section');
            const error = document.getElementById('error-msg');

            if (code === "200819") {
                auth.style.opacity = '0';
                auth.style.transform = 'scale(0.95) translateY(-10px)';
                
                setTimeout(() => {
                    auth.style.display = 'none';
                    proposal.style.display = 'block';
                    
                    // Smooth transition to show proposal
                    setTimeout(() => {
                        proposal.style.opacity = '1';
                        proposal.style.transform = 'translateY(0)';
                        startFlowSequence();
                    }, 50);
                }, 550);
            } else {
                error.style.display = 'block';
                auth.classList.add('shake');
                setTimeout(() => auth.classList.remove('shake'), 400);
            }
        }

        function startFlowSequence() {
            const textEl = document.getElementById('dynamic-text');
            const proposal = document.getElementById('proposal-section');
            const finalScreen = document.getElementById('final-screen');
            const footer = document.getElementById('imrul-footer');

            // 1. Text smoothly glows up
            setTimeout(() => {
                textEl.classList.add('text-reveal');
            }, 200);

            // 2. Automatically moves to next screen after the set duration
            setTimeout(() => {
                // Fade out the "I Love You" screen
                proposal.style.opacity = '0';
                proposal.style.transform = 'translateY(-20px)';

                setTimeout(() => {
                    proposal.style.display = 'none';
                    finalScreen.style.display = 'block';
                    
                    // Fade in the premium final proposal screen & Imrul's footer
                    setTimeout(() => {
                        finalScreen.style.opacity = '1';
                        footer.style.opacity = '1'; // Footer reveals smoothly
                        
                        // Start ambient cinematic star particles background-e
                        startAesthetics();
                    }, 50);
                }, 800);

            }, textDisplayDuration + 200); 
        }

        function startAesthetics() {
            // Background slow moving elegant particles
            setInterval(() => createParticle('#ff477e'), 350);
            setInterval(() => createParticle('#fff'), 550);
            setInterval(() => createParticle('#00b4db'), 750);
        }

        function createParticle(color) {
            const star = document.createElement('div');
            star.classList.add('particle');
            star.style.backgroundColor = color;
            star.style.left = Math.random() * 100 + "vw";
            star.style.bottom = "-20px";
            
            // Randomize blur and sizes for premium cinematic depth-of-field look
            const size = Math.random() * 6 + 2 + "px";
            star.style.width = size;
            star.style.height = size;
            
            const randomBlur = Math.random() * 4;
            star.style.filter = `blur(${randomBlur}px)`;
            star.style.boxShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
            star.style.animationDuration = Math.random() * 2 + 3.5 + "s";
            
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4500);
        }
    </script>

</body>
</html>
