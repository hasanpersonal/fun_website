<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        /* Premium Dark Dynamic Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0b0612;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 71, 126, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(0, 180, 219, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 450px;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
        }

        /* Glassmorphic Passcode Box */
        #auth-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #auth-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.8);
            margin-top: 0;
            margin-bottom: 25px;
        }

        .code-input {
            width: 80%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            outline: none;
            text-align: center;
            font-size: 22px;
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .code-input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 20px rgba(255, 71, 126, 0.3);
        }

        .base-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .base-btn:hover {
            transform: scale(1.03);
            background: #f0f0f0;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Proposal Section Setup */
        #proposal-section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* REAL SQUEEZE CRUSH ANIMATION */
        .text-wrapper {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        #dynamic-text {
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            white-space: nowrap;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            display: inline-block;
        }

        /* Smooth horizontal crushing animation class */
        .squeeze-active {
            animation: squeezeAndCrush 1.1s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }

        @keyframes squeezeAndCrush {
            0% {
                transform: scaleX(1) scaleY(1);
                filter: blur(0px);
                opacity: 1;
            }
            45%, 55% {
                transform: scaleX(0) scaleY(1.6); /* Text-ti deyal-er moto chepe 0 width hoye jabe */
                filter: blur(4px);
                opacity: 0.1;
            }
            100% {
                transform: scaleX(1) scaleY(1);
                filter: blur(0px);
                opacity: 1;
            }
        }

        /* End State Ultra Glowing Text */
        .final-glow {
            animation: neonPulse 2s infinite alternate ease-in-out;
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 15px rgba(255, 71, 126, 0.6); transform: scale(0.98); }
            100% { text-shadow: 0 0 35px #ff477e, 0 0 60px #ff85a2; transform: scale(1.02); }
        }

        /* Proposal details slide up at the end */
        .fade-in-ui {
            opacity: 0;
            transform: translateY(20px);
            animation: smoothFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes smoothFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.3rem;
            color: rgba(255,255,255,0.95);
            margin-bottom: 35px;
            margin-top: 10px;
        }

        .choice-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
        }

        #yes-btn {
            background: linear-gradient(45deg, #ff477e, #ff85a2);
            color: #fff;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.3);
        }

        #no-btn {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Ambient floating light particles */
        .particle {
            position: absolute;
            background: #ff477e;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 4s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Shake animation for incorrect password */
        .shake { animation: runShake 0.4s ease-in-out; }
        @keyframes runShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <!-- Passcode Interface -->
    <div class="container" id="auth-section">
        <h2>ENTER PRIVACY CODE</h2>
        <!-- Input e Enter marle auto unlock hobe 'onkeydown' er jonno -->
        <input type="password" id="passcode" class="code-input" placeholder="••••••" maxlength="6" onkeydown="if(event.key === 'Enter') verifyCode()">
        <br>
        <button class="base-btn" onclick="verifyCode()">UNLOCK</button>
        <p id="error-msg">Incorrect Code. Try again! 😉</p>
    </div>

    <!-- Proposal Interface -->
    <div class="container" id="proposal-section">
        <div class="text-wrapper">
            <div id="dynamic-text">I Love You</div>
        </div>
        
        <!-- Interactive part reveals after squeeze loop -->
        <div id="interactive-ui" style="display: none;">
            <div class="question-text">Will you be my forever?</div>
            <div class="choice-btns">
                <button class="base-btn" id="yes-btn" onclick="celebrate()">YES</button>
                <button class="base-btn" id="no-btn" onmouseover="dodgeButton()">NO</button>
            </div>
        </div>
    </div>

    <script>
        function verifyCode() {
            // .trim() use kora hoyeche jate kono khali space thakle auto bad hoye jay
            const code = document.getElementById('passcode').value.trim();
            const auth = document.getElementById('auth-section');
            const proposal = document.getElementById('proposal-section');
            const error = document.getElementById('error-msg');

            if (code === "200819") {
                auth.style.opacity = '0';
                auth.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    auth.style.display = 'none';
                    proposal.style.display = 'block';
                    
                    // Smoothly fade in the proposal wrapper
                    setTimeout(() => {
                        proposal.style.opacity = '1';
                        proposal.style.transform = 'translateY(0)';
                        runSqueezeSequence();
                    }, 50);
                }, 400);
            } else {
                error.style.display = 'block';
                auth.classList.add('shake');
                setTimeout(() => auth.classList.remove('shake'), 400);
            }
        }

        function runSqueezeSequence() {
            const textEl = document.getElementById('dynamic-text');
            const uiEl = document.getElementById('interactive-ui');

            // --- 1st Squeeze: "I Love You" -> "I ❤️ you" ---
            setTimeout(() => {
                textEl.classList.add('squeeze-active');
                
                // Exactly at 500ms (when text is squeezed to 0 width), swap text
                setTimeout(() => {
                    textEl.innerHTML = "I ❤️ you";
                    textEl.style.color = "#ff85a2";
                }, 500);

            }, 1200); 

            // --- 2nd Squeeze: "I ❤️ you" -> "I ❤️ U" ---
            setTimeout(() => {
                textEl.classList.remove('squeeze-active');
                void textEl.offsetWidth; // Force CSS reload to re-trigger animation
                textEl.classList.add('squeeze-active');

                // Squeeze to 0 and switch to ultimate form
                setTimeout(() => {
                    textEl.innerHTML = "I ❤️ U";
                    textEl.style.color = "#ff477e";
                }, 500);

            }, 3000); 

            // --- End sequence: Final neon glow and reveal layout ---
            setTimeout(() => {
                textEl.classList.remove('squeeze-active');
                textEl.classList.add('final-glow');
                
                // UI panel sliding up beautifully
                uiEl.style.display = 'block';
                uiEl.classList.add('fade-in-ui');
                
                // Start magical ambient background lighting
                setInterval(() => createParticle('#fff'), 500);
                setInterval(() => createParticle('#ff477e'), 700);
            }, 4300);
        }

        function dodgeButton() {
            const noBtn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 120) - (window.innerWidth / 2 - 60);
            const y = Math.random() * (window.innerHeight - 60) - (window.innerHeight / 2 - 30);
            
            noBtn.style.position = 'fixed';
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            noBtn.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        function celebrate() {
            const proposal = document.getElementById('proposal-section');
            proposal.innerHTML = `
                <h1 class="final-glow" style="font-family:'Dancing Script', cursive; font-size: 3.8rem; color: #ff477e; margin: 0;">Locked Forever! ❤️</h1>
                <p class="fade-in-ui" style="color: rgba(255,255,255,0.6); font-size: 14px; letter-spacing: 2px; margin-top: 15px;">MY HEART IS YOURS.</p>
            `;
            // Heart shower animation
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerText = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.bottom = '-20px';
                heart.style.fontSize = Math.random() * 15 + 15 + 'px';
                heart.style.animation = 'particleFloat 3s linear infinite';
                heart.style.textShadow = '0 0 10px #ff477e';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 3000);
            }, 80);
        }

        function createParticle(color) {
            const star = document.createElement('div');
            star.classList.add('particle');
            star.style.backgroundColor = color;
            star.style.left = Math.random() * 100 + "vw";
            
            const size = Math.random() * 5 + 4 + "px";
            star.style.width = size;
            star.style.height = size;
            star.style.boxShadow = `0 0 10px ${color}`;
            star.style.animationDuration = Math.random() * 2 + 3 + "s";
            
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4000);
        }
    </script>

</body>
</html>
