<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Velvet Dark Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #06020b;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 71, 126, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 180, 219, 0.12) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
            position: relative;
        }

        /* Glassmorphic Passcode Box */
        #auth-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 50px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #auth-section h2 {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.6);
            margin-top: 0;
            margin-bottom: 30px;
        }

        .code-input {
            width: 80%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            outline: none;
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .code-input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 25px rgba(255, 71, 126, 0.25);
        }

        .base-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 45px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .base-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.15);
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Proposal Section Setup */
        #proposal-section {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* Elegant Fade Glow for I Love You */
        #dynamic-text {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            margin: 0;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1s ease-in-out;
        }

        .text-reveal {
            opacity: 1 !important;
            transform: scale(1) !important;
            text-shadow: 0 0 30px rgba(255, 71, 126, 0.6), 0 0 50px rgba(255, 85, 162, 0.3) !important;
        }

        /* Final Screen Styling */
        #final-screen {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .final-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #ff477e;
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 71, 126, 0.5);
        }

        .final-sub {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* Footer Style */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
        }

        .footer span {
            color: #ff477e;
            font-weight: 500;
        }

        /* Smooth Floating Ambient Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 4s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            30% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Shake utility */
        .shake { animation: runShake 0.4s ease-in-out; }
        @keyframes runShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <!-- Passcode Interface -->
    <div class="container" id="auth-section">
        <h2>ENTER PRIVACY CODE</h2>
        <input type="password" id="passcode" class="code-input" placeholder="••••••" maxlength="6" onkeydown="if(event.key === 'Enter') verifyCode()">
        <br>
        <button class="base-btn" onclick="verifyCode()">UNLOCK</button>
        <p id="error-msg">Incorrect Code. Try again! 😉</p>
    </div>

    <!-- Proposal / Text Reveal Interface -->
    <div class="container" id="proposal-section">
        <h1 id="dynamic-text">I Love You</h1>
    </div>

    <!-- Final Beautiful Destination Page -->
    <div class="container" id="final-screen">
        <h1 class="final-title">Be My Forever? ❤️</h1>
        <p class="final-sub">Every second is better with you.</p>
    </div>

    <!-- Imrul's Premium Footer -->
    <div class="footer" id="imrul-footer">
        Designed by <span>Imrul Hasan</span>
    </div>

    <script>
        // DURATION CONFIGURATION (Ekhane shomoy change korba - Millisecond hishebe)
        // 1000 millisecond = 1 Second
        const textDisplayDuration = 3000; // 'I Love You' text-ti koto kkhon shobuj/glowing thakbe (3 Seconds)

        function verifyCode() {
            const code = document.getElementById('passcode').value.trim();
            const auth = document.getElementById('auth-section');
            const proposal = document.getElementById('proposal-section');
            const error = document.getElementById('error-msg');

            if (code === "200819") {
                auth.style.opacity = '0';
                auth.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    auth.style.display = 'none';
                    proposal.style.display = 'block';
                    
                    // Smooth transition to show proposal
                    setTimeout(() => {
                        proposal.style.opacity = '1';
                        startFlowSequence();
                    }, 50);
                }, 450);
            } else {
                error.style.display = 'block';
                auth.classList.add('shake');
                setTimeout(() => auth.classList.remove('shake'), 400);
            }
        }

        function startFlowSequence() {
            const textEl = document.getElementById('dynamic-text');
            const proposal = document.getElementById('proposal-section');
            const finalScreen = document.getElementById('final-screen');
            const footer = document.getElementById('imrul-footer');

            // 1. Text smoothly glows up
            setTimeout(() => {
                textEl.classList.add('text-reveal');
            }, 200);

            // 2. Automatically moves to next screen after the set duration
            setTimeout(() => {
                // Fade out the "I Love You" screen
                proposal.style.opacity = '0';
                proposal.style.transform = 'translateY(-10px)';

                setTimeout(() => {
                    proposal.style.display = 'none';
                    finalScreen.style.display = 'block';
                    
                    // Fade in the premium final proposal screen & Imrul's footer
                    setTimeout(() => {
                        finalScreen.style.opacity = '1';
                        footer.style.opacity = '1'; // Footer reveals smoothly
                        
                        // Start ambient cinematic star particles background-e
                        startAesthetics();
                    }, 50);
                }, 800);

            }, textDisplayDuration + 200); 
        }

        function startAesthetics() {
            // Background slow moving elegant particles
            setInterval(() => createParticle('#ff477e'), 400);
            setInterval(() => createParticle('#fff'), 600);
        }

        function createParticle(color) {
            const star = document.createElement('div');
            star.classList.add('particle');
            star.style.backgroundColor = color;
            star.style.left = Math.random() * 100 + "vw";
            star.style.bottom = "-10px";
            
            const size = Math.random() * 5 + 3 + "px";
            star.style.width = size;
            star.style.height = size;
            star.style.boxShadow = `0 0 15px ${color}, 0 0 30px ${color}`;
            star.style.animationDuration = Math.random() * 2 + 3 + "s";
            
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4000);
        }
    </script>

</body>
</html>
