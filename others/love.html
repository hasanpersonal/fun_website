<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark/Neon Romantic Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #2c001e 0%, #0c000b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Glassmorphic Cyber-Romantic Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 71, 126, 0.1);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            position: relative;
        }

        /* Passcode Section */
        #auth-section h2 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #ff477e;
            text-shadow: 0 0 10px rgba(255, 71, 126, 0.5);
        }

        .passcode-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .passcode-input {
            width: 80%;
            padding: 15px;
            border: 2px solid rgba(255, 71, 126, 0.3);
            border-radius: 50px;
            outline: none;
            text-align: center;
            font-size: 18px;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            transition: all 0.3s;
        }

        .passcode-input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 15px rgba(255, 71, 126, 0.4);
        }

        .btn {
            background: linear-gradient(45deg, #ff477e, #ff85a2);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.6);
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        /* Love Proposal Section */
        #proposal-section {
            display: none;
            opacity: 0;
        }

        /* Tomar Custom Text Morphing/Shrinking Animation */
        .text-container {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .proposal-text {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            position: absolute;
            width: 100%;
            text-shadow: 0 0 20px rgba(255, 71, 126, 0.6);
        }

        /* 3 Steps of Text Animation */
        #text-step1 {
            font-size: 3.5rem;
            color: #fff;
            animation: shrinkOut 3s forwards ease-in-out;
        }

        #text-step2 {
            font-size: 2.8rem;
            color: #ff85a2;
            opacity: 0;
            animation: fadeInShrink 3s forwards ease-in-out;
            animation-delay: 3s;
        }

        #text-step3 {
            font-size: 2.2rem;
            color: #ff477e;
            opacity: 0;
            animation: finalGlow 2s infinite alternate ease-in-out;
            animation-delay: 6s;
        }

        @keyframes shrinkOut {
            0% { transform: scale(1); opacity: 1; filter: blur(0px); }
            80% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; filter: blur(10px); display: none; }
        }

        @keyframes fadeInShrink {
            0% { transform: scale(1.3); opacity: 0; filter: blur(10px); }
            20% { transform: scale(1); opacity: 1; filter: blur(0px); }
            80% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(0.6); opacity: 0; filter: blur(5px); display: none; }
        }

        @keyframes finalGlow {
            0% { transform: scale(0.9); opacity: 1; text-shadow: 0 0 10px #ff477e; }
            100% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px #ff477e, 0 0 50px #ff85a2; }
        }

        .sub-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards ease-out;
            animation-delay: 6.5s; /* Final text er por ashbe */
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0;
            animation: fadeInUp 1s forwards ease-out;
            animation-delay: 7s;
        }

        #yes-btn {
            background: linear-gradient(45deg, #00b4db, #0083b0);
            box-shadow: 0 5px 15px rgba(0, 180, 219, 0.4);
        }
        #yes-btn:hover {
            box-shadow: 0 8px 25px rgba(0, 180, 219, 0.6);
        }

        #no-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        /* Glowing Floating Hearts & Stars */
        .particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-105vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* Shake & Fade Utility */
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
    </style>
</head>
<body>

    <div class="card" id="auth-section">
        <h2>ENTER PRIVACY CODE</h2>
        <div class="passcode-wrapper">
            <input type="password" id="passcode" class="passcode-input" placeholder="••••••" maxlength="6">
        </div>
        <button class="btn" onclick="checkPasscode()">ACCESS</button>
        <p id="error-msg">Wrong Code. Think again! 😉</p>
    </div>

    <div class="card" id="proposal-section">
        <div class="text-container">
            <div class="proposal-text" id="text-step1">I Love You</div>
            <div class="proposal-text" id="text-step2">I ❤️ you</div>
            <div class="proposal-text" id="text-step3">I ❤️ U</div>
        </div>
        
        <div class="sub-text" id="sub-message">Will you be my forever?</div>
        
        <div class="action-buttons">
            <button class="btn" id="yes-btn" onclick="sayYes()">YES!</button>
            <button class="btn" id="no-btn" onmouseover="dodgeNo()">NO</button>
        </div>
    </div>

    <script>
        function checkPasscode() {
            const passcode = document.getElementById('passcode').value;
            const authSection = document.getElementById('auth-section');
            const proposalSection = document.getElementById('proposal-section');
            const errorMsg = document.getElementById('error-msg');

            if (passcode === "200819") {
                authSection.style.opacity = '0';
                setTimeout(() => {
                    authSection.style.display = 'none';
                    proposalSection.style.display = 'block';
                    setTimeout(() => {
                        proposalSection.style.opacity = '1';
                    }, 50);
                    // Ambient particles chalu hobe
                    startParticles();
                }, 500);
            } else {
                errorMsg.style.display = 'block';
                authSection.classList.add('shake');
                setTimeout(() => authSection.classList.remove('shake'), 400);
            }
        }

        function dodgeNo() {
            const noBtn = document.getElementById('no-btn');
            // 'NO' button screen er jekono jaygay smoothly baje bhabe dore palabe
            const x = Math.random() * (window.innerWidth - 120) - (window.innerWidth / 2 - 60);
            const y = Math.random() * (window.innerHeight - 60) - (window.innerHeight / 2 - 30);
            
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = '99';
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            noBtn.style.transition = 'transform 0.2s ease-out';
        }

        function sayYes() {
            const proposalSection = document.getElementById('proposal-section');
            proposalSection.innerHTML = `
                <h1 style="font-family:'Dancing Script', cursive; font-size: 3.5rem; color: #ff477e; text-shadow: 0 0 20px rgba(255,71,126,0.6); margin-0;">Forever Yours! ❤️</h1>
                <p style="font-size: 1.1rem; margin-top: 15px; color: #ff85a2;">You just made me the happiest person in the universe!</p>
            `;
            // Blast of speed for hearts
            setInterval(() => createParticle('❤️'), 50);
        }

        function startParticles() {
            // Background slow moving neon particles
            setInterval(() => createParticle('❤️'), 600);
            setInterval(() => createParticle('✨'), 800);
        }

        function createParticle(symbol) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerText = symbol;
            
            // Random properties for gorgeous look
            particle.style.left = Math.random() * 100 + "vw";
            particle.style.fontSize = Math.random() * 15 + 15 + "px";
            particle.style.animationDuration = Math.random() * 3 + 4 + "s";
            
            // Neon pink or soft white glow based on symbol
            if(symbol === '❤️') {
                particle.style.textShadow = "0 0 10px #ff477e";
            } else {
                particle.style.textShadow = "0 0 10px #fff";
            }
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 7000);
        }
    </script>

</body>
</html>
