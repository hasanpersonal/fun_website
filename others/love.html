<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        /* Modern Minimalist Dark Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #09050d;
            background-image: 
                radial-gradient(at 20% 20%, rgba(255, 71, 126, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(0, 180, 219, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Premium Smooth Card */
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        /* Passcode UI */
        #auth-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: opacity 0.5s ease;
        }

        #auth-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        .code-input {
            width: 70%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            outline: none;
            text-align: center;
            font-size: 20px;
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .code-input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 20px rgba(255, 71, 126, 0.3);
        }

        .base-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }

        .base-btn:hover {
            transform: scale(1.03);
            background: #f0f0f0;
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Proposal UI (Hidden initially) */
        #proposal-section {
            display: none;
        }

        /* THE REAL SQUEEZE TEXT ANIMATION */
        .text-wrapper {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            perspective: 1000px;
        }

        #dynamic-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -1px;
            white-space: nowrap;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            display: inline-block;
            transform-origin: center;
        }

        /* Squeeze class applied via JS */
        .squeeze-active {
            animation: ultimateSqueeze 1.2s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        @keyframes ultimateSqueeze {
            0% {
                transform: scaleX(1) scaleY(1);
                filter: blur(0px);
                opacity: 1;
            }
            45%, 55% {
                transform: scaleX(0) scaleY(1.8); /* Completely flattened horizontally, stretched vertically */
                filter: blur(5px);
                opacity: 0.2;
                letter-spacing: -20px;
            }
            100% {
                transform: scaleX(1) scaleY(1);
                filter: blur(0px);
                opacity: 1;
            }
        }

        /* Final State Glowing text */
        .final-glow {
            animation: pulseGlow 2s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 15px rgba(255, 71, 126, 0.6); transform: scale(0.98); }
            100% { text-shadow: 0 0 35px #ff477e, 0 0 60px #ff85a2; transform: scale(1.02); }
        }

        /* Action elements fading in smoothly at the end */
        .fade-in-ui {
            opacity: 0;
            transform: translateY(20px);
            animation: cleanFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cleanFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 35px;
        }

        .choice-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        #yes-btn {
            background: linear-gradient(45deg, #ff477e, #ff85a2);
            color: #fff;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.3);
        }

        #no-btn {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Background floating subtle elements */
        .floating-star {
            position: absolute;
            background: #ff477e;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: starFloat 5s linear infinite;
        }

        @keyframes starFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Shake utility for wrong passcode */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="container" id="auth-section">
        <h2>SECURE ACCESS</h2>
        <input type="password" id="passcode" class="code-input" placeholder="••••••" maxlength="6">
        <br>
        <button class="base-btn" onclick="verifyCode()">UNLOCK</button>
        <p id="error-msg">Incorrect Code. Try again.</p>
    </div>

    <div class="container" id="proposal-section">
        <div class="text-wrapper">
            <div id="dynamic-text">I Love You</div>
        </div>
        
        <div id="interactive-ui" style="display: none;">
            <div class="question-text">Will you walk through life with me?</div>
            <div class="choice-btns">
                <button class="base-btn" id="yes-btn" onclick="celebrate()">YES</button>
                <button class="base-btn" id="no-btn" onmouseover="dodgeButton()">NO</button>
            </div>
        </div>
    </div>
