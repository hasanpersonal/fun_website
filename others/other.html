<div class="page-container">
    <div class="button-grid">
        <!-- ১ নম্বর বাটন: এটি আপনার তৈরি করা love.html পেজে নিয়ে যাবে -->
        <a href="love.html" class="custom-btn btn-love">
            Love Page
        </a>

        <!-- বাকি ৩টি বাটন খালি (disabled করা যাতে ক্লিক না হয়) -->
        <button class="custom-btn btn-empty" disabled>Button 1</button>
        <button class="custom-btn btn-empty" disabled>Button 2</button>
        <button class="custom-btn btn-empty" disabled>Button 3</button>
    </div>
</div>

<style>
    /* CSS Variables (কালার ও স্টাইল সহজে চেঞ্জ করার জন্য) */
    :root {
        --love-color: #ff4d6d;
        --love-hover: #ff758f;
        --empty-bg: #e0e0e0;
        --empty-text: #8c8c8c;
        --radius: 12px;
        --transition: all 0.3s ease;
    }

    /* মেইন পেজ লেআউট */
    .page-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 50vh;
        padding: 20px;
    }

    /* গ্রিড সিস্টেম (বাটনগুলো সমান দূরত্বে সুন্দরভাবে সাজানোর জন্য) */
    .button-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* ২ কলামের গ্রিড */
        gap: 20px;
        max-width: 500px;
        width: 100%;
    }

    /* ২টা বাটনের কমন বেসিক সিএসএস */
    .custom-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 32px;
        font-size: 16px;
        font-weight: 600;
        font-family: inherit;
        border: none;
        border-radius: var(--radius);
        text-decoration: none;
        box-sizing: border-box;
        transition: var(--transition);
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    /* Love বাটনের জন্য প্রোপার সিএসএস */
    .btn-love {
        background-color: var(--love-color);
        color: #ffffff;
        cursor: pointer;
    }

    .btn-love:hover {
        background-color: var(--love-hover);
        transform: translateY(-2px); /* হালকা উপরে উঠবে */
        box-shadow: 0 6px 12px rgba(255, 77, 109, 0.3); /* গ্লো ইফেক্ট */
    }

    .btn-love:active {
        transform: translateY(0);
    }

    /* খালি বাটনগুলোর জন্য প্রোপার সিএসএস */
    .btn-empty {
        background-color: var(--empty-bg);
        color: var(--empty-text);
        cursor: not-allowed; /* মাউস নিলে ক্রস চিহ্ন দেখাবে */
        opacity: 0.7;
    }

    /* রেসপনসিভ ব্রেকপয়েন্ট: স্ক্রিন ছোট হলে (মোবাইলে) বাটনগুলো ১ লাইনে চলে আসবে */
    @media (max-width: 480px) {
        .button-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
