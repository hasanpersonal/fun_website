---
layout: default
title: Premium Interface
---

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        /* Premium Dark Gradient Background */
        background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* Glassmorphism Container */
    .container {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 40px 30px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        text-align: center;
        width: 100%;
        max-width: 380px;
    }

    .title {
        color: #ffffff;
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 25px;
        letter-spacing: 1px;
        opacity: 0.9;
    }

    .button-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* General Button Style */
    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 56px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        border: none;
        outline: none;
        background: transparent;
    }

    /* 1st Button: For You (Active & Glowing) */
    .btn-active {
        background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        color: #ffffff;
        box-shadow: 0 8px 24px rgba(255, 65, 108, 0.25);
        letter-spacing: 0.5px;
    }

    .btn-active:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(255, 65, 108, 0.45);
        letter-spacing: 1.5px;
        opacity: 0.95;
    }

    /* Remaining 4 Buttons: Premium Empty Placeholders */
    .btn-empty {
        border: 1px dashed rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.01);
        cursor: not-allowed;
        position: relative;
    }

    /* Empty button guthote halka premium hover effect */
    .btn-empty:hover {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.2);
    }
</style>

<div class="container">
    <h2 class="title">Premium Space</h2>
    
    <div class="button-group">
        <a href="{{ '/love.html' | relative_url }}" class="btn btn-active">For You</a>
        
        <button class="btn btn-empty" disabled></button>
        <button class="btn btn-empty" disabled></button>
        <button class="btn btn-empty" disabled></button>
        <button class="btn btn-empty" disabled></button>
    </div>
</div>
