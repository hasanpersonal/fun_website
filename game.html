layout: default
title: Game Zone

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* 1. Base Reset for this specific component */
    .mobile-game-hub {
        box-sizing: border-box !important;
        font-family: 'Outfit', sans-serif !important;
        width: 100% !important;
        max-width: 420px !important; /* Perfect mobile width */
        margin: 30px auto !important;
        padding: 0 15px !important;
    }

    .mobile-game-hub * {
        box-sizing: border-box !important;
        margin: 0;
        padding: 0;
    }

    /* 2. Main Card Container */
    .hub-container {
        background: #0f172a !important; /* Deep dark blue */
        border-radius: 24px !important;
        padding: 30px 20px !important;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15) !important;
        border: 1px solid #1e293b !important;
    }

    /* 3. Header */
    .hub-header {
        text-align: center !important;
        margin-bottom: 25px !important;
    }

    .hub-header h2 {
        color: #ffffff !important;
        font-size: 1.6rem !important;
        font-weight: 800 !important;
        letter-spacing: 1px !important;
        text-transform: uppercase !important;
        margin-bottom: 5px !important;
    }

    .hub-header p {
        color: #94a3b8 !important;
        font-size: 0.9rem !important;
    }

    /* 4. Game List (Flexbox ensures it never breaks) */
    .game-list {
        display: flex !important;
        flex-direction: column !important;
        gap: 12px !important;
    }

    .game-card {
        display: flex !important;
        align-items: center !important;
        background: #1e293b !important;
        padding: 12px 16px !important;
        border-radius: 16px !important;
        text-decoration: none !important;
        transition: transform 0.2s, background 0.2s !important;
        border: 1px solid transparent !important;
    }

    .game-card:hover:not(.locked) {
        background: #27354f !important;
        transform: translateY(-2px) !important;
        border-color: #38bdf8 !important;
    }

    /* Icon Box (Fixed width so it never squishes) */
    .game-icon {
        width: 48px !important;
        height: 48px !important;
        border-radius: 12px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        font-size: 20px !important;
        color: white !important;
        flex-shrink: 0 !important; /* PREVENTS SQUISHING */
    }

    .icon-archer { background: linear-gradient(135deg, #f43f5e, #fb923c) !important; }
    .icon-car { background: linear-gradient(135deg, #0ea5e9, #3b82f6) !important; }
    .icon-uno { background: linear-gradient(135deg, #10b981, #059669) !important; }
    .icon-lock { background: #334155 !important; color: #64748b !important; }

    /* Text Area */
    .game-info {
        margin-left: 15px !important;
        flex-grow: 1 !important;
        min-width: 0 !important; /* Fixes text overflow issue */
    }

    .game-info h3 {
        color: #f8fafc !important;
        font-size: 1.05rem !important;
        font-weight: 600 !important;
        margin-bottom: 2px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }

    .game-info p {
        color: #94a3b8 !important;
        font-size: 0.8rem !important;
    }

    /* Play Button Icon on the right */
    .play-btn {
        width: 32px !important;
        height: 32px !important;
        border-radius: 50% !important;
        background: rgba(255,255,255,0.1) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        color: #38bdf8 !important;
        font-size: 12px !important;
        flex-shrink: 0 !important;
    }

    .game-card:hover:not(.locked) .play-btn {
        background: #38bdf8 !important;
        color: white !important;
    }

    /* Locked State */
    .game-card.locked {
        opacity: 0.6 !important;
        cursor: not-allowed !important;
    }

    .game-card.locked .play-btn {
        display: none !important;
    }

    /* 5. Footer & Back Button */
    .hub-footer {
        margin-top: 25px !important;
        text-align: center !important;
    }

    .back-btn {
        display: inline-flex !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 12px 24px !important;
        background: #38bdf8 !important;
        color: #0f172a !important;
        border-radius: 30px !important;
        font-weight: 800 !important;
        font-size: 0.9rem !important;
        text-decoration: none !important;
        margin-bottom: 20px !important;
        transition: transform 0.2s !important;
    }

    .back-btn:active {
        transform: scale(0.95) !important;
    }

    .credit-text {
        color: #64748b !important;
        font-size: 0.8rem !important;
    }
    
    .credit-text strong {
        color: #e2e8f0 !important;
    }
</style>

<div class="mobile-game-hub">
    <div class="hub-container">
        
        <header class="hub-header">
            <h2>Game Zone</h2>
            <p>Select a game to play</p>
        </header>

        <div class="game-list">
            
            <a href="https://hasanpersonal.github.io/archer/" class="game-card">
                <div class="game-icon icon-archer"><i class="fa-solid fa-bullseye"></i></div>
                <div class="game-info">
                    <h3>Archer</h3>
                    <p>Arcade & Difficulty</p>
                </div>
                <div class="play-btn"><i class="fa-solid fa-play"></i></div>
            </a>

            <a href="https://hasanpersonal.github.io/car" class="game-card">
                <div class="game-icon icon-car"><i class="fa-solid fa-car-side"></i></div>
                <div class="game-info">
                    <h3>Car Multiplayer</h3>
                    <p>Speed & Control</p>
                </div>
                <div class="play-btn"><i class="fa-solid fa-play"></i></div>
            </a>

            <a href="https://hasanpersonal.github.io/uno" class="game-card">
                <div class="game-icon icon-uno"><i class="fa-solid fa-layer-group"></i></div>
                <div class="game-info">
                    <h3>Uno Online</h3>
                    <p>Play with friends</p>
                </div>
                <div class="play-btn"><i class="fa-solid fa-play"></i></div>
            </a>

            <div class="game-card locked">
                <div class="game-icon icon-lock"><i class="fa-solid fa-lock"></i></div>
                <div class="game-info">
                    <h3>Coming Soon</h3>
                    <p>Under Development</p>
                </div>
            </div>

        </div>

        <div class="hub-footer">
            <a href="https://hasanpersonal.github.io/fun_website/index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Home
            </a>
            <p class="credit-text">Coded by <strong>Imrul Hasan 😇</strong></p>
        </div>

    </div>
</div>
